# docker-compose.yml: Compose para despliegue en producción.
#
# Este archivo se usa en el servidor destino para levantar los servicios
# necesarios para ejecutar la aplicación en producción:
# - Redis (canales + Celery)
# - PostgreSQL (base de datos)
# - Backend Django (Daphne)
# - Frontend Angular (Nginx)
#
# Uso:
#   docker compose up -d
#   docker compose down

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      # Persistencia en el proyecto; evita pérdida de datos al recrear contenedores.
      - ./docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-chemistry_db}
    volumes:
      # Persistencia en el proyecto; garantiza que la DB se conserva entre deploys.
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: chemistry-backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_INTERNAL_PORT:-8000}:8000"
    volumes:
      # Persistencia de archivos de media y logs en el proyecto.
      - ./backend/media:/app/media
    environment:
      # Django / seguridad
      DJANGO_DEBUG: "False"
      ENABLE_CORS: "True"
      CORS_ALLOW_ALL_ORIGINS: "False"
      CORS_ALLOW_CREDENTIALS: "True"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}

      # Base de datos
      DB_ENGINE: "postgres"
      DB_NAME: ${DB_NAME:-chemistry_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}

      # Redis / Celery / Channels
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      CHANNEL_LAYERS_REDIS_URL: "redis://redis:6379/1"

  frontend:
    image: chemistry-frontend:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_INTERNAL_PORT:-4210}:80"
    depends_on:
      backend:
        condition: service_started
