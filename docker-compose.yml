# docker-compose.yml: Compose para despliegue en producción.
#
# Este archivo se usa en el servidor destino para levantar los servicios
# necesarios para ejecutar la aplicación en producción:
# - Redis (canales + Celery)
# - PostgreSQL (base de datos)
# - Backend Django (Daphne)
# - Frontend Angular (Nginx)
# - Celery Worker (ejecución de jobs científicos)
#
# Uso:
#   docker compose up -d
#   docker compose down

networks:
  chemistry-apps-network:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - chemistry-apps-network
    volumes:
      # Persistencia en el proyecto; evita pérdida de datos al recrear contenedores.
      - ./docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - chemistry-apps-network
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-chemistry_db}
    volumes:
      # Persistencia en el proyecto; garantiza que la DB se conserva entre deploys.
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-chemistry_db}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-chem-gl}/chemistry-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    networks:
      - chemistry-apps-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_INTERNAL_PORT:-8000}:8000"
    volumes:
      # Persistencia de archivos de media y logs en el proyecto.
      - ./backend/media:/app/media
    environment:
      # Django / seguridad
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${SECRET_KEY}
      ENABLE_CORS: "True"
      CORS_ALLOW_ALL_ORIGINS: "False"
      CORS_ALLOW_CREDENTIALS: "True"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}

      # Base de datos
      DB_ENGINE: "postgres"
      DB_NAME: ${DB_NAME:-chemistry_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}

      # Redis / Celery / Channels
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      CHANNEL_LAYERS_REDIS_URL: "redis://redis:6379/1"

      # Runtime tools científicos (JRE/JAR)
      RUNTIME_TOOLS_DIR: "/app/media/runtime-tools"
      RUNTIME_TOOLS_STRICT_CHECK: "True"
      RUNTIME_TOOLS_DOWNLOAD_TIMEOUT_SECONDS: ${RUNTIME_TOOLS_DOWNLOAD_TIMEOUT_SECONDS:-1200}
      RUNTIME_TOOLS_DOWNLOAD_MAX_ATTEMPTS: ${RUNTIME_TOOLS_DOWNLOAD_MAX_ATTEMPTS:-5}

      # Evita KeyError en getpass.getuser() cuando HOST_UID no tiene entrada en /etc/passwd
      USER: appuser
      LOGNAME: appuser
      HOME: /app
      MPLCONFIGDIR: /tmp/matplotlib-cache
      TORCHINDUCTOR_CACHE_DIR: /tmp/torchinductor-cache
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s = socket.create_connection(('127.0.0.1', 8000), 2); s.close()",
        ]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 900s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        API_BASE_URL: ${BACKEND_PUBLIC_URL}
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-chem-gl}/chemistry-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - chemistry-apps-network
    ports:
      - "${FRONTEND_INTERNAL_PORT:-4210}:80"
    depends_on:
      backend:
        condition: service_healthy

  celery-worker:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-chem-gl}/chemistry-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    command:
      [
        "sh",
        "-c",
        "RUNTIME_TOOLS_STRICT_CHECK=false python manage.py ensure_runtime_tools && exec python -m celery -A config worker -l info",
      ]
    networks:
      - chemistry-apps-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./backend/media:/app/media
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${SECRET_KEY}
      ENABLE_CORS: "False"
      DB_ENGINE: "postgres"
      DB_NAME: ${DB_NAME:-chemistry_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      CHANNEL_LAYERS_REDIS_URL: "redis://redis:6379/1"

      # Runtime tools científicos (JRE/JAR)
      RUNTIME_TOOLS_DIR: "/app/media/runtime-tools"
      RUNTIME_TOOLS_STRICT_CHECK: "True"
      RUNTIME_TOOLS_DOWNLOAD_TIMEOUT_SECONDS: ${RUNTIME_TOOLS_DOWNLOAD_TIMEOUT_SECONDS:-1200}
      RUNTIME_TOOLS_DOWNLOAD_MAX_ATTEMPTS: ${RUNTIME_TOOLS_DOWNLOAD_MAX_ATTEMPTS:-5}

      # Evita KeyError en getpass.getuser() cuando HOST_UID no tiene entrada en /etc/passwd
      USER: appuser
      LOGNAME: appuser
      HOME: /app
      MPLCONFIGDIR: /tmp/matplotlib-cache
      TORCHINDUCTOR_CACHE_DIR: /tmp/torchinductor-cache
