        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                JobYaFinalizado:
                  value:
                    detail: 'No es posible cancelar un job en estado terminal (estado
                      actual: completed).'
                  summary: Job ya finalizado
          description: El job está en estado terminal y no puede cancelarse.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
