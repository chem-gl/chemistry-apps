    SaScoreJobCreateRequest:
      type: object
      description: |-
        Valida la creación de un job de SA score.

        Acepta `smiles` como string único o lista de strings.
        Acepta `methods` como lista de métodos válidos (ambit, brsa, rdkit).
      properties:
        smiles:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 4096
          description: Lista de SMILES a evaluar. Máximo 500. Cada elemento debe ser
            un SMILES válido.
          maxItems: 500
          minItems: 1
        methods:
          type: array
          items:
            $ref: '#/components/schemas/MethodsEnum'
          default:
          - ambit
          - brsa
          - rdkit
          description: 'Métodos de SA score a calcular. Opciones: ambit, brsa, rdkit.
