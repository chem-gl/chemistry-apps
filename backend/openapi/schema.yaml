openapi: 3.0.3
info:
  title: Chemistry Apps API
  version: 1.0.0
  description: API de plataforma científica modular para ejecutar jobs asíncronos
    por plugins científicos, con observabilidad de progreso y logs en tiempo real,
    cache por hash y recuperación activa automática.
  contact:
    name: Chemistry Apps Team
    url: https://github.com/chem-gl/chemistry-apps
  license:
    name: MIT
    url: https://opensource.org/license/mit/
paths:
  /api/auth/app-configs/{app_name}/:
    get:
      operationId: auth_app_configs_retrieve
      description: Consulta y actualiza configuración de app del usuario actual.
      parameters:
      - in: path
        name: app_name
        schema:
          type: string
        required: true
      tags:
      - Auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectiveAppConfig'
          description: ''
    patch:
      operationId: auth_app_configs_partial_update
      description: Consulta y actualiza configuración de app del usuario actual.
      parameters:
      - in: path
        name: app_name
        schema:
          type: string
        required: true
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserAppConfigRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserAppConfigRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserAppConfigRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAppConfig'
          description: ''
  /api/auth/apps/:
    get:
      operationId: auth_apps_list
      description: |-
        Expone apps disponibles para el usuario actual con RBAC resuelto.

        Acepta `?group_id=X` para evaluar acceso estrictamente desde el grupo activo.
      tags:
      - Auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccessibleScientificApp'
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Endpoint de login JWT con claims de dominio.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DomainTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DomainTokenObtainPairRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Devuelve el perfil del usuario autenticado.
      tags:
      - Auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: Endpoint de refresco JWT.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/cadma-py/jobs/:
    post:
      operationId: cadma_py_jobs_create
      description: Encola un job de comparación contra una familia de referencia.
      summary: Crear Job de CADMA Py
      tags:
      - CADMAPy
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CadmaPyJobCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CadmaPyJobCreateRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/CadmaPyJobCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CadmaPyJobResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/cadma-py/jobs/{id}/:
    get:
      operationId: cadma_py_jobs_retrieve
      description: Devuelve estado, progreso y resultados del job por UUID.
      summary: Consultar Job
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job.
        required: true
      tags:
      - CADMAPy
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/cadma-py/jobs/{id}/report-csv/:
    get:
      operationId: cadma_py_jobs_report_csv_retrieve
      description: Descarga CSV con resultados del job. Solo aplica para estado completed.
      summary: Descargar Reporte CSV
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this scientific job.
        required: true
      tags:
      - CADMAPy
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: Archivo CSV.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/cadma-py/jobs/{id}/report-error/:
    get:
      operationId: cadma_py_jobs_report_error_retrieve
      description: Descarga reporte de error para jobs failed con error_trace. Incluye
        parámetros de entrada y detalle del fallo.
      summary: Descargar Reporte de Error
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this scientific job.
        required: true
      tags:
      - CADMAPy
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: Reporte de error.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/cadma-py/jobs/{id}/report-inputs/:
    get:
      operationId: cadma_py_jobs_report_inputs_retrieve
      description: Descarga ZIP con todos los archivos de entrada persistidos y manifest.json
        para reproducibilidad/reintento.
      summary: Descargar Entradas Originales ZIP
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this scientific job.
        required: true
      tags:
      - CADMAPy
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: Archivo ZIP con entradas persistidas del job.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: No existen artefactos de entrada persistidos.
  /api/cadma-py/jobs/{id}/report-log/:
    get:
      operationId: cadma_py_jobs_report_log_retrieve
      description: Descarga log técnico con parámetros de entrada, estado, resultados
        y eventos de ejecución.
      summary: Descargar Reporte LOG
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this scientific job.
        required: true
      tags:
      - CADMAPy
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: Log de auditoría.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/cadma-py/jobs/reference-libraries/:
    get:
      operationId: cadma_py_jobs_reference_libraries_list
      description: Lista o crea familias de referencia visibles para el actor.
      summary: Listar o Crear Familias de Referencia CADMA
      tags:
      - CADMAPy
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CadmaReferenceLibraryResponse'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CadmaReferenceLibraryResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
    post:
      operationId: cadma_py_jobs_reference_libraries_create
      description: Lista o crea familias de referencia visibles para el actor.
      summary: Listar o Crear Familias de Referencia CADMA
      tags:
      - CADMAPy
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CadmaReferenceLibraryWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CadmaReferenceLibraryWriteRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/CadmaReferenceLibraryWriteRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CadmaReferenceLibraryResponse'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CadmaReferenceLibraryResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/cadma-py/jobs/reference-libraries/{library_id}/:
    get:
      operationId: cadma_py_jobs_reference_libraries_retrieve
      description: Opera sobre una familia concreta manteniendo las reglas RBAC.
      summary: Consultar, actualizar o eliminar una familia CADMA
      parameters:
      - in: path
        name: library_id
        schema:
          type: string
        required: true
      tags:
      - CADMAPy
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CadmaReferenceLibraryResponse'
          description: ''
        '204':
          description: Familia eliminada correctamente.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
    patch:
      operationId: cadma_py_jobs_reference_libraries_partial_update
      description: Opera sobre una familia concreta manteniendo las reglas RBAC.
      summary: Consultar, actualizar o eliminar una familia CADMA
      parameters:
      - in: path
        name: library_id
        schema:
          type: string
        required: true
      tags:
      - CADMAPy
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCadmaReferenceLibraryWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCadmaReferenceLibraryWriteRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCadmaReferenceLibraryWriteRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CadmaReferenceLibraryResponse'
          description: ''
        '204':
          description: Familia eliminada correctamente.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
    delete:
      operationId: cadma_py_jobs_reference_libraries_destroy
      description: Opera sobre una familia concreta manteniendo las reglas RBAC.
      summary: Consultar, actualizar o eliminar una familia CADMA
      parameters:
      - in: path
        name: library_id
        schema:
          type: string
        required: true
      tags:
      - CADMAPy
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CadmaReferenceLibraryResponse'
          description: ''
        '204':
          description: Familia eliminada correctamente.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/cadma-py/jobs/reference-libraries/{library_id}/fork/:
    post:
      operationId: cadma_py_jobs_reference_libraries_fork_create
      description: Genera una copia editable para el actor sin alterar la familia
        compartida original.
      summary: Crear una copia editable de una familia compartida de solo lectura
      parameters:
      - in: path
        name: library_id
        schema:
          type: string
        required: true
      tags:
      - CADMAPy
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CadmaReferenceLibraryForkRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CadmaReferenceLibraryForkRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/CadmaReferenceLibraryForkRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CadmaReferenceLibraryResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/cadma-py/jobs/reference-libraries/{library_id}/report-inputs/:
    get:
      operationId: cadma_py_jobs_reference_libraries_report_inputs_retrieve
      description: Entrega un ZIP con todos los archivos fuente guardados para una
        familia.
      summary: Descargar ZIP de archivos fuente de una familia de referencia
      parameters:
      - in: path
        name: library_id
        schema:
          type: string
        required: true
      tags:
      - CADMAPy
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/cadma-py/jobs/reference-libraries/{library_id}/rows/:
    post:
      operationId: cadma_py_jobs_reference_libraries_rows_create
      description: Agrega un compuesto con ADME auto-calculado por RDKit.
      summary: Agregar un compuesto nuevo a una familia de referencia
      parameters:
      - in: path
        name: library_id
        schema:
          type: string
        required: true
      tags:
      - CADMAPy
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CadmaCompoundAddRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CadmaCompoundAddRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/CadmaCompoundAddRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CadmaCompoundRowResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/cadma-py/jobs/reference-libraries/{library_id}/rows/{row_index}/:
    patch:
      operationId: cadma_py_jobs_reference_libraries_rows_partial_update
      description: Actualiza campos editables (name, paper_reference, paper_url, evidence_note).
      summary: Editar o eliminar una fila de compuesto por índice
      parameters:
      - in: path
        name: library_id
        schema:
          type: string
        required: true
      - in: path
        name: row_index
        schema:
          type: string
          pattern: ^\d+$
        required: true
      tags:
      - CADMAPy
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCadmaReferenceRowPatchRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCadmaReferenceRowPatchRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCadmaReferenceRowPatchRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CadmaCompoundRowResponse'
          description: ''
        '204':
          description: Compuesto eliminado correctamente.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
    delete:
      operationId: cadma_py_jobs_reference_libraries_rows_destroy
      description: Actualiza campos editables (name, paper_reference, paper_url, evidence_note).
      summary: Editar o eliminar una fila de compuesto por índice
      parameters:
      - in: path
        name: library_id
        schema:
          type: string
        required: true
      - in: path
        name: row_index
        schema:
          type: string
          pattern: ^\d+$
        required: true
      tags:
      - CADMAPy
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CadmaCompoundRowResponse'
          description: ''
        '204':
          description: Compuesto eliminado correctamente.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/cadma-py/jobs/reference-samples/:
    get:
      operationId: cadma_py_jobs_reference_samples_list
      description: Expone datasets de ejemplo tomados del directorio deprecated.
      summary: Listar muestras legacy disponibles para CADMA Py
      tags:
      - CADMAPy
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CadmaReferenceSample'
          description: ''
  /api/cadma-py/jobs/reference-samples/{sample_key}/detail/:
    get:
      operationId: cadma_py_jobs_reference_samples_detail_retrieve
      description: Entrega el mismo detalle rico de familia para las muestras bundled
        seed.
      summary: Ver detalle completo de una muestra legacy sin importarla
      parameters:
      - in: path
        name: sample_key
        schema:
          type: string
          pattern: ^[a-z]+$
        required: true
      tags:
      - CADMAPy
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CadmaReferenceLibraryResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/cadma-py/jobs/reference-samples/{sample_key}/preview/:
    get:
      operationId: cadma_py_jobs_reference_samples_preview_list
      description: Devuelve name + SMILES de cada fila del CSV legacy para vista previa.
      summary: Vista previa de compuestos de una muestra legacy
      parameters:
      - in: path
        name: sample_key
        schema:
          type: string
          pattern: ^[a-z]+$
        required: true
      tags:
      - CADMAPy
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CadmaReferenceSamplePreviewRow'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/cadma-py/jobs/reference-samples/import/:
    post:
      operationId: cadma_py_jobs_reference_samples_import_create
