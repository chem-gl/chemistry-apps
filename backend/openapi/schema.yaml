            $ref: '#/components/schemas/SmileitGeneratedStructure'
        traceability_rows:
          type: array
          items:
            $ref: '#/components/schemas/SmileitTraceabilityRow'
        truncated:
          type: boolean
          default: false
        principal_smiles:
          type: string
          maxLength: 2000
        selected_atom_indices:
          type: array
          items:
            type: integer
            minimum: 0
        export_name_base:
          type: string
