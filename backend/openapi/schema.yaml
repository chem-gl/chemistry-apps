openapi: 3.0.3
info:
  title: Chemistry Apps API
  version: 1.0.0
  description: API de plataforma científica modular para ejecutar jobs asíncronos
    por plugins (calculator y random-numbers), con observabilidad de progreso y logs
    en tiempo real, cache por hash y recuperación activa automática.
  contact:
    name: Chemistry Apps Team
    url: https://github.com/chem-gl/chemistry-apps
  license:
    name: MIT
    url: https://opensource.org/license/mit/
paths:
  /api/calculator/jobs/:
    post:
      operationId: calculator_jobs_create
      description: Recibe parámetros estrictos de calculadora y despacha el trabajo
        en background cuando no existe caché.
      summary: Crear Job de Calculadora
      tags:
      - Calculator
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculatorJobCreateRequest'
            examples:
              CrearJobCalculadoraPotencia:
                value:
                  version: 1.0.0
                  op: pow
                  a: 2.0
                  b: 8.0
                summary: Crear job calculadora potencia
                description: 'Contrato estricto para potencia: resultado 2^8.'
              CrearJobCalculadoraFactorial:
                value:
                  version: 1.0.0
                  op: factorial
                  a: 5.0
                summary: Crear job calculadora factorial
                description: 'Contrato estricto para factorial: solo usa el campo
                  a.'
              CrearJobCalculadoraBásico:
                value:
                  version: 1.0.0
                  op: add
                  a: 5.0
                  b: 3.0
                summary: Crear job calculadora básico
                description: Contrato estricto para crear un job de calculadora.
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CalculatorJobCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CalculatorJobCreateRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculatorJobResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                FactorialInválido:
                  value:
                    a:
                    - Para factorial, a debe ser un entero no negativo.
                  summary: Factorial inválido
                OperaciónBinariaSinB:
                  value:
                    b:
                    - El campo b es obligatorio para operaciones binarias.
                  summary: Operación binaria sin b
          description: Error de validación del contrato de calculadora.
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: No fue posible encolar o crear el job.
  /api/calculator/jobs/{id}/:
    get:
      operationId: calculator_jobs_retrieve
      description: Devuelve estado y resultado del job de calculadora por UUID.
      summary: Consultar Job de Calculadora
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job de calculadora.
        required: true
      tags:
      - Calculator
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculatorJobResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job de calculadora no encontrado.
  /api/jobs/:
    get:
      operationId: jobs_list
      description: Devuelve el listado de jobs científicos registrados en todas las
        apps, incluyendo su estado actual. Permite filtros opcionales por plugin y
        estado.
      summary: Listar Jobs Científicos
      parameters:
      - in: query
        name: plugin_name
        schema:
          type: string
        description: Filtra por nombre de plugin/app científica.
      - in: query
        name: status
        schema:
          type: string
        description: 'Filtra por estado del job. Valores válidos: pending, running,
          paused, completed, failed.'
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScientificJob'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                EstadoInválido:
                  value:
                    detail: 'Invalid status filter. Allowed values are: pending, running,
                      paused, completed, failed.'
                  summary: Estado inválido
          description: Filtro de estado inválido.
    post:
      operationId: jobs_create
      description: Evalua reglas de hashing/caching y despacha al worker Celery solo
        cuando el job no tiene cache disponible.
      summary: Despachar Job Científico
      tags:
      - Jobs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
            examples:
              EjemploDeCreaciónDeJob:
                value:
                  plugin_name: calculator
                  version: '1.0'
                  parameters:
                    op: add
                    a: 5
                    b: 3
                summary: Ejemplo de Creación de Job
                description: Creación de una tarea matemática en background.
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScientificJob'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ErrorPluginNoRegistrado:
                  value:
                    detail: Plugin requested is not registered
                  summary: Error plugin no registrado
          description: Error de validacion en parametros.
  /api/jobs/{id}/:
    get:
      operationId: jobs_retrieve
      description: Recupera todo el estado guardado incluyendo outputs una vez finalizado
        el trabajo subyacente.
      summary: Consultar Estado y Resultados de un Job
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job cientifico a consultar.
        required: true
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScientificJob'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: El trabajo no pudo ser encontrado en el Registry local.
  /api/jobs/{id}/events/:
    get:
      operationId: jobs_events_retrieve
      description: Abre un stream Server-Sent Events para recibir actualizaciones
        de progreso en tiempo real hasta completar/fallar o alcanzar timeout.
      summary: Suscribirse a eventos de progreso de un Job (SSE)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job científico.
        required: true
      - in: query
        name: timeout_seconds
        schema:
          type: integer
        description: 'Tiempo máximo del stream SSE en segundos. Valor por defecto:
          30.'
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                EventoSSE:
                  value: |+
                    id: 4
                    event: job.progress
                    data: {"job_id":"8ca8c1fa-1f2f-4a13-9038-9e1be7d0ce24","status":"running","progress_percentage":35,"progress_stage":"running","progress_message":"Ejecutando plugin científico.","progress_event_index":4,"updated_at":"2026-03-10T12:00:00Z"}

                  summary: Evento SSE
          description: Flujo SSE de eventos job.progress con id incremental.
        '404':
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
  /api/jobs/{id}/logs/:
    get:
      operationId: jobs_logs_retrieve
      description: Devuelve eventos de log persistidos para un job en orden ascendente
        por event_index, con soporte de cursor incremental y límite de página.
      summary: Consultar historial de logs de un Job
      parameters:
      - in: query
        name: after_event_index
        schema:
          type: integer
        description: Retorna eventos con índice mayor al valor indicado.
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job científico.
        required: true
      - in: query
        name: limit
        schema:
          type: integer
        description: Cantidad máxima de eventos a devolver. Máximo 500.
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobLogList'
              examples:
                ListadoDeLogsPorJob:
                  value:
                    job_id: 8ca8c1fa-1f2f-4a13-9038-9e1be7d0ce24
                    count: 2
                    next_after_event_index: 13
                    results:
                    - job_id: 8ca8c1fa-1f2f-4a13-9038-9e1be7d0ce24
                      event_index: 12
                      level: info
                      source: random_numbers.plugin
                      message: Procesando lote de generación.
                      payload:
                        current_batch_size: 5
                      created_at: '2026-03-11T10:25:00Z'
                    - job_id: 8ca8c1fa-1f2f-4a13-9038-9e1be7d0ce24
                      event_index: 13
                      level: debug
                      source: random_numbers.plugin
                      message: Número generado correctamente.
                      payload:
                        generated_number: 1024
                      created_at: '2026-03-11T10:25:01Z'
                  summary: Listado de logs por job
                  description: Página de logs de ejecución de un job.
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
  /api/jobs/{id}/logs/events/:
    get:
      operationId: jobs_logs_events_retrieve
      description: Abre un stream Server-Sent Events para recibir logs en tiempo real
        hasta timeout o finalización del job.
      summary: Suscribirse a logs de un Job (SSE)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job científico.
        required: true
      - in: query
        name: timeout_seconds
        schema:
          type: integer
        description: 'Tiempo máximo del stream SSE en segundos. Valor por defecto:
          30.'
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                EventoSSEDeLog:
                  value: |+
                    id: 12
                    event: job.log
                    data: {"job_id":"8ca8c1fa-1f2f-4a13-9038-9e1be7d0ce24","event_index":12,"level":"info","source":"random_numbers.plugin","message":"Procesando lote de generación.","payload":{"current_batch_size":5},"created_at":"2026-03-11T10:25:00Z"}

                  summary: Evento SSE de log
          description: Flujo SSE de eventos job.log con id incremental.
        '404':
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
  /api/jobs/{id}/pause/:
    post:
      operationId: jobs_pause_create
      description: Solicita pausa cooperativa para un job. Si el job está pending
        se pausa de inmediato; si está running queda marcada la pausa y el plugin
        coopera en la próxima verificación de control.
      summary: Solicitar pausa de un Job
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job científico.
        required: true
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobControlActionResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Transición inválida o plugin sin soporte de pausa.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
  /api/jobs/{id}/progress/:
    get:
      operationId: jobs_progress_retrieve
      description: Devuelve un snapshot del progreso actual del job para facilitar
        monitorización por polling o reconexión de stream SSE.
      summary: Consultar progreso de un Job
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job científico.
        required: true
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobProgressSnapshot'
              examples:
                SnapshotDeProgreso:
                  value:
                    job_id: 8ca8c1fa-1f2f-4a13-9038-9e1be7d0ce24
                    status: running
                    progress_percentage: 35
                    progress_stage: running
                    progress_message: Ejecutando plugin científico.
                    progress_event_index: 3
                    updated_at: '2026-03-10T12:00:00Z'
                  summary: Snapshot de progreso
                  description: Estado actual del job para consumo por polling o SSE.
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
  /api/jobs/{id}/resume/:
    post:
      operationId: jobs_resume_create
      description: Reanuda un job pausado y lo reencola para continuar desde su estado
        persistido cuando el plugin soporta pausa cooperativa.
      summary: Reanudar un Job pausado
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job científico.
        required: true
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobControlActionResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Transición inválida o plugin sin soporte de pausa.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
  /api/random-numbers/jobs/:
    post:
      operationId: random_numbers_jobs_create
      description: Crea un job asíncrono que genera números aleatorios por lotes según
        una URL semilla y un intervalo en segundos.
      summary: Crear Job de Números Aleatorios
      tags:
      - RandomNumbers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RandomNumbersJobCreateRequest'
            examples:
              CrearJobRandomNumbers:
                value:
                  version: 1.0.0
                  seed_url: https://example.com/seed.txt
                  numbers_per_batch: 5
                  interval_seconds: 120
                  total_numbers: 55
                summary: Crear job random numbers
                description: Genera 55 números en lotes de 5 con 120 segundos entre
                  lotes.
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RandomNumbersJobCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RandomNumbersJobCreateRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RandomNumbersJobResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error de validación del contrato random_numbers.
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: No fue posible encolar o crear el job.
  /api/random-numbers/jobs/{id}/:
    get:
      operationId: random_numbers_jobs_retrieve
      description: Devuelve estado y resultado de random_numbers por UUID.
      summary: Consultar Job de Números Aleatorios
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job random_numbers.
        required: true
      tags:
      - RandomNumbers
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RandomNumbersJobResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job random_numbers no encontrado.
components:
  schemas:
    CalculatorJobCreateRequest:
      type: object
      description: |-
        Define parámetros estrictos para crear un job de calculadora.

        Este serializer protege el contrato antes de llegar al plugin. Así se evita
        encolar trabajos que no cumplirán reglas mínimas de dominio.
      properties:
        version:
          type: string
          minLength: 1
          default: '1.0'
          description: Versión del algoritmo calculadora.
          maxLength: 50
        op:
          allOf:
          - $ref: '#/components/schemas/CalculatorOperationEnum'
          description: |-
            Operación aritmética a ejecutar.

            * `add` - add
            * `sub` - sub
            * `mul` - mul
            * `div` - div
            * `pow` - pow
            * `factorial` - factorial
        a:
          type: number
          format: double
          description: Primer operando numérico.
        b:
          type: number
          format: double
          nullable: true
          description: Segundo operando numérico. Es obligatorio para add/sub/mul/div/pow
            y no debe enviarse para factorial.
      required:
      - a
      - op
    CalculatorJobResponse:
      type: object
      description: |-
        Respuesta tipada para jobs de calculadora consumibles por frontend.

        Mantiene consistencia con el modelo de jobs de core y permite a clientes
        consumir resultados sin interpretar estructuras dinámicas ad-hoc.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        job_hash:
          type: string
          readOnly: true
          description: Hash SHA-256 for caching
        plugin_name:
          type: string
          readOnly: true
        algorithm_version:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/JobStatusEnum'
          readOnly: true
        cache_hit:
          type: boolean
          readOnly: true
        cache_miss:
          type: boolean
          readOnly: true
        parameters:
          $ref: '#/components/schemas/CalculatorParameters'
        results:
          allOf:
          - $ref: '#/components/schemas/CalculatorResult'
          nullable: true
        error_trace:
          type: string
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - algorithm_version
      - cache_hit
      - cache_miss
      - created_at
      - error_trace
      - id
      - job_hash
      - parameters
      - plugin_name
      - status
      - updated_at
    CalculatorOperationEnum:
      enum:
      - add
      - sub
      - mul
      - div
      - pow
      - factorial
      type: string
      description: |-
        * `add` - add
        * `sub` - sub
        * `mul` - mul
        * `div` - div
        * `pow` - pow
        * `factorial` - factorial
    CalculatorParameters:
      type: object
      description: Estructura de parámetros persistidos para el job calculadora.
      properties:
        op:
          $ref: '#/components/schemas/CalculatorOperationEnum'
        a:
          type: number
          format: double
          description: Primer operando almacenado para trazabilidad.
        b:
          type: number
          format: double
          nullable: true
          description: Segundo operando cuando aplica; ausente o nulo para factorial.
      required:
      - a
      - op
    CalculatorResult:
      type: object
      description: Resultado estricto del plugin calculadora.
      properties:
        final_result:
          type: number
          format: double
        metadata:
          $ref: '#/components/schemas/CalculatorResultMetadata'
      required:
      - final_result
      - metadata
    CalculatorResultMetadata:
      type: object
      description: Metadatos de trazabilidad del resultado de calculadora.
      properties:
        operation_used:
          allOf:
          - $ref: '#/components/schemas/CalculatorOperationEnum'
          description: |-
            Operación utilizada por el plugin para obtener el resultado.

            * `add` - add
            * `sub` - sub
            * `mul` - mul
            * `div` - div
            * `pow` - pow
            * `factorial` - factorial
        operand_a:
          type: number
          format: double
          description: Valor de entrada del operando a.
        operand_b:
          type: number
          format: double
          nullable: true
          description: Valor de entrada del operando b cuando aplica.
      required:
      - operand_a
      - operand_b
      - operation_used
    ErrorResponse:
      type: object
      description: Schema consistente para respuestas de error API.
      properties:
        detail:
          type: string
          description: Descripción del error manejado por API.
      required:
      - detail
    JobControlActionResponse:
      type: object
      description: Respuesta estándar para acciones de control (pause/resume).
      properties:
        detail:
          type: string
          description: Resultado de la operación de control.
        job:
          description: Snapshot actualizado del job tras la acción.
      required:
      - detail
      - job
    JobCreateRequest:
      type: object
      description: |-
        Serializer puro para las peticiones de creación de un nuevo
        Job científico, siguiendo fuertemente el schema de OpenAPI.
      properties:
        plugin_name:
          type: string
          minLength: 1
          description: El nombre registrado del plugin o algoritmo a ejecutar.
          maxLength: 100
        version:
          type: string
          minLength: 1
          default: '1.0'
          description: Versión asociada del algoritmo que será parte de la llave de
            caché.
          maxLength: 50
        parameters:
          description: Diccionario dinámico de inputs o parámetros del job.
      required:
      - parameters
      - plugin_name
    JobLogEvent:
      type: object
      description: Contrato de un evento de log persistido para un job.
      properties:
        job_id:
          type: string
          format: uuid
          description: Identificador único del job.
        event_index:
          type: integer
          minimum: 1
          description: Índice incremental del evento de log dentro del job.
        level:
          allOf:
          - $ref: '#/components/schemas/LevelEnum'
          description: |-
            Nivel de severidad del evento de log.

            * `debug` - debug
            * `info` - info
            * `warning` - warning
            * `error` - error
        source:
          type: string
          description: Origen del evento de log.
        message:
          type: string
          description: Mensaje de observabilidad.
        payload:
          description: Contexto estructurado adicional del evento de log.
        created_at:
          type: string
          format: date-time
          description: Marca temporal de creación del evento.
      required:
      - created_at
      - event_index
      - job_id
      - level
      - message
      - payload
      - source
    JobLogList:
      type: object
      description: Contrato de respuesta para listado paginado de logs por job.
      properties:
        job_id:
          type: string
          format: uuid
          description: Identificador único del job.
        count:
          type: integer
          minimum: 0
          description: Cantidad de eventos en la página de resultados.
        next_after_event_index:
          type: integer
          minimum: 0
          description: Cursor recomendado para consultar la siguiente página.
        results:
          type: array
          items:
            $ref: '#/components/schemas/JobLogEvent'
      required:
      - count
      - job_id
      - next_after_event_index
      - results
    JobProgressSnapshot:
      type: object
      description: Contrato de progreso de job usado en endpoint snapshot y stream
        SSE.
      properties:
        job_id:
          type: string
          format: uuid
          description: Identificador único del job.
        status:
          allOf:
          - $ref: '#/components/schemas/JobStatusEnum'
          description: |-
            Estado principal del ciclo de vida del job.

            * `pending` - Pending
            * `running` - Running
            * `paused` - Paused
            * `completed` - Completed
            * `failed` - Failed
        progress_percentage:
          type: integer
          maximum: 100
          minimum: 0
          description: Porcentaje de avance entre 0 y 100.
        progress_stage:
          allOf:
          - $ref: '#/components/schemas/JobProgressStageEnum'
          description: |-
            Etapa fina de ejecución para seguimiento en tiempo real.

            * `pending` - pending
            * `queued` - queued
            * `running` - running
            * `paused` - paused
            * `recovering` - recovering
            * `caching` - caching
            * `completed` - completed
            * `failed` - failed
        progress_message:
          type: string
          description: Mensaje legible para usuario con contexto de ejecución.
        progress_event_index:
          type: integer
          minimum: 0
          description: Contador incremental de eventos emitidos por el job.
        updated_at:
          type: string
          format: date-time
          description: Marca temporal de última actualización.
      required:
      - job_id
      - progress_event_index
      - progress_message
      - progress_percentage
      - progress_stage
      - status
      - updated_at
    JobProgressStageEnum:
      enum:
      - pending
      - queued
      - running
      - paused
      - recovering
      - caching
      - completed
      - failed
      type: string
      description: |-
        * `pending` - pending
        * `queued` - queued
        * `running` - running
        * `paused` - paused
        * `recovering` - recovering
        * `caching` - caching
        * `completed` - completed
        * `failed` - failed
    JobStatusEnum:
      enum:
      - pending
      - running
      - paused
      - completed
      - failed
      type: string
      description: |-
        * `pending` - Pending
        * `running` - Running
        * `paused` - Paused
        * `completed` - Completed
        * `failed` - Failed
    LevelEnum:
      enum:
      - debug
      - info
      - warning
      - error
      type: string
      description: |-
        * `debug` - debug
        * `info` - info
        * `warning` - warning
        * `error` - error
    RandomNumbersJobCreateRequest:
      type: object
      description: Valida request de creación para jobs de generación aleatoria.
      properties:
        version:
          type: string
          minLength: 1
          default: 1.0.0
          maxLength: 50
        seed_url:
          type: string
          format: uri
          minLength: 1
          description: URL cuyo contenido se usa como semilla determinista.
        numbers_per_batch:
          type: integer
          maximum: 500
          minimum: 1
          description: Cantidad de números generados por ciclo.
        interval_seconds:
          type: integer
          maximum: 3600
          minimum: 1
          description: Tiempo de espera entre ciclos de generación en segundos.
        total_numbers:
          type: integer
          maximum: 1000
          minimum: 1
          description: Cantidad total de números aleatorios a generar.
      required:
      - interval_seconds
      - numbers_per_batch
      - seed_url
      - total_numbers
    RandomNumbersJobResponse:
      type: object
      description: Salida tipada para jobs de random_numbers.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        job_hash:
          type: string
          readOnly: true
          description: Hash SHA-256 for caching
        plugin_name:
          type: string
          readOnly: true
        algorithm_version:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/JobStatusEnum'
          readOnly: true
        cache_hit:
          type: boolean
          readOnly: true
        cache_miss:
          type: boolean
          readOnly: true
        progress_percentage:
          type: integer
          readOnly: true
          description: Porcentaje de progreso entre 0 y 100.
        progress_stage:
          type: string
          readOnly: true
          description: 'Etapa actual de ejecución: pending/queued/running/paused/caching/completed/failed.'
        progress_message:
          type: string
          readOnly: true
          description: Mensaje corto y legible del estado de progreso.
        progress_event_index:
          type: integer
          readOnly: true
          description: Contador incremental de eventos de progreso emitidos.
        parameters:
          $ref: '#/components/schemas/RandomNumbersParameters'
        results:
          allOf:
          - $ref: '#/components/schemas/RandomNumbersResult'
          nullable: true
        error_trace:
          type: string
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - algorithm_version
      - cache_hit
      - cache_miss
      - created_at
      - error_trace
      - id
      - job_hash
      - parameters
      - plugin_name
      - progress_event_index
      - progress_message
      - progress_percentage
      - progress_stage
      - status
      - updated_at
    RandomNumbersParameters:
      type: object
      description: Contrato persistido de parámetros del job random_numbers.
      properties:
        seed_url:
          type: string
          format: uri
        numbers_per_batch:
          type: integer
          minimum: 1
        interval_seconds:
          type: integer
          minimum: 1
        total_numbers:
          type: integer
          minimum: 1
      required:
      - interval_seconds
      - numbers_per_batch
      - seed_url
      - total_numbers
    RandomNumbersResult:
      type: object
      description: Resultado tipado de números aleatorios generados.
      properties:
        generated_numbers:
          type: array
          items:
            type: integer
            minimum: 0
        metadata:
          $ref: '#/components/schemas/RandomNumbersResultMetadata'
      required:
      - generated_numbers
      - metadata
    RandomNumbersResultMetadata:
      type: object
      description: Metadatos del resultado de generación aleatoria.
      properties:
        seed_url:
          type: string
          format: uri
        seed_digest:
          type: string
          maxLength: 64
        numbers_per_batch:
          type: integer
          minimum: 1
        interval_seconds:
          type: integer
          minimum: 1
        total_numbers:
          type: integer
          minimum: 1
      required:
      - interval_seconds
      - numbers_per_batch
      - seed_digest
      - seed_url
      - total_numbers
    ScientificJob:
      type: object
      description: |-
        Serializer central que describe toda la entidad del Job.
        Usado como schema de salida.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        job_hash:
          type: string
          readOnly: true
          description: Hash SHA-256 for caching
        plugin_name:
          type: string
          readOnly: true
        algorithm_version:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/JobStatusEnum'
          readOnly: true
        cache_hit:
          type: boolean
          readOnly: true
        cache_miss:
          type: boolean
          readOnly: true
        progress_percentage:
          type: integer
          readOnly: true
          description: Porcentaje de progreso entre 0 y 100.
        progress_stage:
          type: string
          readOnly: true
          description: 'Etapa actual de ejecución: pending/queued/running/paused/caching/completed/failed.'
        progress_message:
          type: string
          readOnly: true
          description: Mensaje corto y legible del estado de progreso.
        progress_event_index:
          type: integer
          readOnly: true
          description: Contador incremental de eventos de progreso emitidos.
        supports_pause_resume:
          type: boolean
          readOnly: true
          description: Indica si el plugin permite pausa cooperativa y reanudación.
        pause_requested:
          type: boolean
          readOnly: true
          description: Marca de control cooperativo para solicitar pausa de ejecución.
        runtime_state:
          readOnly: true
          description: Estado serializable de ejecución para reanudar tareas pausadas.
        paused_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Marca temporal del último momento en que el job quedó en pausa.
        resumed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Marca temporal de la última reanudación explícita del job.
        parameters:
          readOnly: true
        results:
          readOnly: true
          nullable: true
        error_trace:
          type: string
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - algorithm_version
      - cache_hit
      - cache_miss
      - created_at
      - error_trace
      - id
      - job_hash
      - parameters
      - pause_requested
      - paused_at
      - plugin_name
      - progress_event_index
      - progress_message
      - progress_percentage
      - progress_stage
      - results
      - resumed_at
      - runtime_state
      - status
      - supports_pause_resume
      - updated_at
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
servers:
- url: http://localhost:8000
  description: Entorno local por hostname
- url: http://127.0.0.1:8000
  description: Entorno local por loopback
tags:
- name: Jobs
  description: Operaciones genéricas para consulta, progreso, eventos SSE y logs de
    jobs.
- name: Calculator
  description: Endpoints de ejecución para operaciones matemáticas de calculadora
    científica.
- name: RandomNumbers
  description: Endpoints de generación por lotes de números aleatorios con semilla
    externa.
