      - username
    VerificationRuleEnum:
      enum:
      - aromatic
      - hbond_donor
      - hbond_acceptor
      - hydrophobic
      - smarts
      type: string
      description: |-
        * `aromatic` - aromatic
        * `hbond_donor` - hbond_donor
        * `hbond_acceptor` - hbond_acceptor
        * `hydrophobic` - hydrophobic
        * `smarts` - smarts
    WorkGroup:
      type: object
      description: Serializer CRUD para grupos de trabajo.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 120
        slug:
          type: string
          maxLength: 140
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        created_by:
          type: integer
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - created_by
      - id
      - name
      - slug
      - updated_at
    WorkGroupRequest:
      type: object
      description: Serializer CRUD para grupos de trabajo.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        slug:
          type: string
          minLength: 1
          maxLength: 140
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
      required:
      - name
      - slug
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
servers:
- url: http://localhost:8000
  description: Entorno local por hostname
- url: http://127.0.0.1:8000
  description: Entorno local por loopback
tags:
- name: Jobs
  description: Operaciones genéricas para consulta, progreso, eventos SSE y logs de
    jobs.
- name: MolarFractions
  description: Endpoints para cálculo asíncrono de fracciones molares en equilibrio
    ácido-base.
- name: Tunnel
  description: Endpoints para cálculo del efecto túnel con teoría de Eckart asimétrica
    y trazabilidad de cambios de entrada.
- name: EasyRate
  description: Endpoints para cinética Easy-rate con carga de archivos Gaussian y
    persistencia de entradas para reproducibilidad.
- name: Marcus
  description: Endpoints para cinética por modelo Marcus con carga multipart y persistencia
    de entradas reproducibles.
- name: ToxicityProperties
  description: Endpoints para predicción toxicológica con ADMET-AI (LD50, Ames y DevTox)
    en jobs asíncronos.
