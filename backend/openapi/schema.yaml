      - queued
      - running
      - paused
      - recovering
      - caching
      - completed
      - failed
      - cancelled
      type: string
      description: |-
        * `pending` - pending
        * `queued` - queued
        * `running` - running
        * `paused` - paused
        * `recovering` - recovering
        * `caching` - caching
        * `completed` - completed
        * `failed` - failed
        * `cancelled` - cancelled
    RandomNumbersJobCreateRequest:
