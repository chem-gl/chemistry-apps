          maxItems: 500
          minItems: 1
        molecules:
          type: array
          items:
            $ref: '#/components/schemas/SaScoreMoleculeInputRequest'
          description: Lista de moléculas con formato {name, smiles}. Si name se omite
            o queda vacío, se usa smiles como nombre.
        methods:
          type: array
          items:
            $ref: '#/components/schemas/MethodsEnum'
          default:
          - ambit
          - brsa
          - rdkit
          description: 'Métodos de SA score a calcular. Opciones: ambit, brsa, rdkit.
            Por defecto todos.'
          minItems: 1
        version:
          type: string
          minLength: 1
          default: 1.0.0
          description: Versión del algoritmo. Por defecto la versión más reciente.
          maxLength: 20
