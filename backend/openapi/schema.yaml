        references:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              additionalProperties: {}
      required:
      - principal_smiles
      - selected_atom_indices
      - total_generated
    SmileitStructuralAnnotation:
      type: object
      description: Región anotada en la estructura principal con tooltip/caption.
      properties:
        pattern_stable_id:
          type: string
        pattern_version:
          type: integer
          minimum: 1
        name:
          type: string
          maxLength: 140
        pattern_type:
          $ref: '#/components/schemas/PatternTypeEnum'
        caption:
          type: string
          maxLength: 300
        atom_indices:
          type: array
          items:
            type: integer
            minimum: 0
        color:
          type: string
          maxLength: 16
      required:
      - atom_indices
      - caption
      - color
      - name
      - pattern_stable_id
      - pattern_type
      - pattern_version
    SmileitStructureInspectionRequestRequest:
      type: object
      description: Entrada para inspección de estructura y anotación automática.
      properties:
        smiles:
          type: string
          minLength: 1
          maxLength: 2000
      required:
      - smiles
    SmileitStructureInspectionResponse:
      type: object
      description: Respuesta enriquecida de inspección molecular para la UI.
      properties:
        canonical_smiles:
          type: string
          maxLength: 2000
        atom_count:
          type: integer
          minimum: 1
        atoms:
          type: array
          items:
            $ref: '#/components/schemas/SmileitAtomInfo'
        svg:
          type: string
        quick_properties:
          $ref: '#/components/schemas/SmileitQuickProperties'
        annotations:
          type: array
          items:
            $ref: '#/components/schemas/SmileitStructuralAnnotation'
        active_pattern_refs:
          type: array
          items:
            $ref: '#/components/schemas/SmileitPatternReference'
      required:
      - active_pattern_refs
      - annotations
      - atom_count
      - atoms
      - canonical_smiles
      - quick_properties
      - svg
    SmileitSubstituentReferenceInputRequest:
      type: object
      description: Referencia inmutable a sustituyente por stable_id + version.
      properties:
        stable_id:
          type: string
          format: uuid
        version:
          type: integer
          minimum: 1
      required:
      - stable_id
      - version
    SmileitSubstitutionTraceEvent:
      type: object
      description: Evento de sustitución aplicado en un derivado generado.
      properties:
        round_index:
          type: integer
          minimum: 1
        site_atom_index:
          type: integer
          minimum: 0
        block_label:
          type: string
          maxLength: 120
        block_priority:
          type: integer
          minimum: 1
        substituent_name:
          type: string
          maxLength: 120
        substituent_smiles:
          type: string
          default: ''
          maxLength: 2000
        substituent_stable_id:
          type: string
        substituent_version:
          type: integer
          minimum: 1
        source_kind:
          $ref: '#/components/schemas/SourceKindEnum'
        bond_order:
          type: integer
          maximum: 3
          minimum: 1
      required:
      - block_label
      - block_priority
      - bond_order
      - round_index
      - site_atom_index
      - source_kind
      - substituent_name
      - substituent_stable_id
      - substituent_version
    SmileitTraceabilityRow:
      type: object
      description: Fila para auditoría de sitio -> sustituyente aplicado por derivado.
      properties:
        derivative_name:
          type: string
          maxLength: 500
        derivative_smiles:
          type: string
          maxLength: 2000
        round_index:
          type: integer
          minimum: 1
        site_atom_index:
          type: integer
          minimum: 0
        block_label:
          type: string
          maxLength: 120
        block_priority:
          type: integer
          minimum: 1
        substituent_name:
          type: string
          maxLength: 120
        substituent_smiles:
          type: string
          default: ''
          maxLength: 2000
        substituent_stable_id:
          type: string
        substituent_version:
          type: integer
          minimum: 1
        source_kind:
          type: string
          maxLength: 20
        bond_order:
          type: integer
          maximum: 3
          minimum: 1
      required:
      - block_label
      - block_priority
      - bond_order
      - derivative_name
      - derivative_smiles
      - round_index
      - site_atom_index
      - source_kind
      - substituent_name
      - substituent_stable_id
      - substituent_version
    SolventEnum:
      enum:
      - Benzene
      - Gas phase (Air)
      - Pentyl ethanoate
      - Water
      - Other
      type: string
      description: "* `` - \n* `Benzene` - Benzene\n* `Gas phase (Air)` - Gas phase
        (Air)\n* `Pentyl ethanoate` - Pentyl ethanoate\n* `Water` - Water\n* `Other`
        - Other"
    SourceFieldEnum:
      enum:
      - reactant_1_file
      - reactant_2_file
      - transition_state_file
      - product_1_file
      - product_2_file
      type: string
      description: |-
        * `reactant_1_file` - reactant_1_file
        * `reactant_2_file` - reactant_2_file
        * `transition_state_file` - transition_state_file
        * `product_1_file` - product_1_file
        * `product_2_file` - product_2_file
    SourceKindEnum:
      enum:
      - catalog
      - manual
      type: string
      description: |-
        * `catalog` - catalog
        * `manual` - manual
    StatusEnum:
      enum:
      - pending
      - running
      - paused
      - completed
      - failed
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `running` - Running
        * `paused` - Paused
        * `completed` - Completed
        * `failed` - Failed
        * `cancelled` - Cancelled
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    ToxicityJobCreateRequest:
      type: object
      description: Valida la creación de un job toxicológico por lista de SMILES.
      properties:
        smiles:
          type: array
          items:
            type: string
            maxLength: 4096
          writeOnly: true
          description: Lista de SMILES a evaluar. No se aplica límite de negocio;
            el procesamiento es por bloques internos.
          minItems: 1
        molecules:
          type: array
          items:
            $ref: '#/components/schemas/ToxicityMoleculeInputRequest'
          description: Lista de moléculas con formato {name, smiles}. Si name se omite
            o queda vacío, se usa smiles como nombre.
        version:
          type: string
          minLength: 1
          default: 1.0.0
          description: Versión de algoritmo a persistir en el job.
          maxLength: 20
    ToxicityJobResponse:
      type: object
      description: Serializa un ScientificJob para la app Toxicity Properties.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        status:
          $ref: '#/components/schemas/StatusEnum'
        progress_percentage:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Porcentaje de progreso entre 0 y 100.
        progress_stage:
          type: string
          description: 'Etapa actual de ejecución: pending/queued/running/paused/caching/completed/failed.'
          maxLength: 40
        progress_message:
          type: string
          description: Mensaje corto y legible del estado de progreso.
          maxLength: 255
        parameters: {}
        results:
          allOf:
          - $ref: '#/components/schemas/ToxicityResults'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - results
      - updated_at
    ToxicityMoleculeInputRequest:
      type: object
      description: Serializa una fila de entrada name/smiles para Toxicity Properties.
      properties:
        name:
          type: string
          maxLength: 4096
        smiles:
          type: string
          minLength: 1
          maxLength: 4096
      required:
      - smiles
    ToxicityMoleculeResult:
      type: object
      description: Serializa una fila de la tabla de propiedades toxicológicas.
      properties:
        name:
          type: string
          readOnly: true
        smiles:
          type: string
          readOnly: true
        LD50_mgkg:
          type: number
          format: double
          readOnly: true
          nullable: true
        mutagenicity:
          type: string
          readOnly: true
          nullable: true
        ames_score:
          type: number
          format: double
          readOnly: true
          nullable: true
        DevTox:
          type: string
          readOnly: true
          nullable: true
        devtox_score:
          type: number
          format: double
          readOnly: true
          nullable: true
        error_message:
          type: string
          readOnly: true
          nullable: true
      required:
      - DevTox
      - LD50_mgkg
      - ames_score
      - devtox_score
      - error_message
      - mutagenicity
      - name
      - smiles
    ToxicityResults:
      type: object
      description: Serializa el bloque total de resultados del job toxicológico.
      properties:
        molecules:
          type: array
          items:
            $ref: '#/components/schemas/ToxicityMoleculeResult'
          readOnly: true
        total:
          type: integer
          readOnly: true
        scientific_references:
          type: array
          items:
            type: string
          readOnly: true
      required:
      - molecules
      - scientific_references
      - total
    TunnelInputChangeEvent:
      type: object
      description: Evento individual de modificación de entradas.
      properties:
        field_name:
          type: string
          maxLength: 100
        previous_value:
          type: number
          format: double
        new_value:
          type: number
          format: double
        changed_at:
          type: string
          maxLength: 80
      required:
      - changed_at
      - field_name
      - new_value
      - previous_value
    TunnelJobCreateRequest:
      type: object
      description: Valida parámetros de creación para jobs de efecto túnel.
      properties:
        version:
          type: string
          minLength: 1
          default: 2.0.0
          maxLength: 50
        reaction_barrier_zpe:
          type: number
          format: double
          description: Reaction barrier ZPE en kcal/mol.
        imaginary_frequency:
          type: number
          format: double
          description: Imaginary frequency en cm^-1 (sin signo negativo).
        reaction_energy_zpe:
          type: number
          format: double
          description: Reaction energy ZPE en kcal/mol.
        temperature:
          type: number
          format: double
          description: Temperatura en Kelvin.
        input_change_events:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Eventos de modificación de entradas capturados en frontend.
          maxItems: 2000
      required:
      - imaginary_frequency
      - reaction_barrier_zpe
      - reaction_energy_zpe
      - temperature
    TunnelJobResponse:
      type: object
      description: Respuesta estable para jobs de la app Tunnel.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        job_hash:
          type: string
          readOnly: true
          description: Hash SHA-256 for caching
        plugin_name:
          type: string
          readOnly: true
        algorithm_version:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        cache_hit:
          type: boolean
          readOnly: true
        cache_miss:
          type: boolean
          readOnly: true
        progress_percentage:
          type: integer
          readOnly: true
          description: Porcentaje de progreso entre 0 y 100.
        progress_stage:
          type: string
          readOnly: true
          description: 'Etapa actual de ejecución: pending/queued/running/paused/caching/completed/failed.'
        progress_message:
          type: string
          readOnly: true
          description: Mensaje corto y legible del estado de progreso.
        progress_event_index:
          type: integer
          readOnly: true
          description: Contador incremental de eventos de progreso emitidos.
        parameters:
          $ref: '#/components/schemas/TunnelParameters'
        results:
          allOf:
          - $ref: '#/components/schemas/TunnelResult'
          nullable: true
        error_trace:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - algorithm_version
      - cache_hit
      - cache_miss
      - created_at
      - error_trace
      - id
      - job_hash
      - parameters
      - plugin_name
      - progress_event_index
      - progress_message
      - progress_percentage
      - progress_stage
      - status
      - updated_at
    TunnelMetadata:
      type: object
      description: Metadatos técnicos de resultado Tunnel.
      properties:
        model_name:
          type: string
          maxLength: 120
        source_library:
          type: string
          maxLength: 120
        units:
          type: object
          additionalProperties:
            type: string
        input_event_count:
          type: integer
          minimum: 0
      required:
      - input_event_count
      - model_name
      - source_library
      - units
    TunnelParameters:
      type: object
      description: Parámetros persistidos de entrada para un job Tunnel.
      properties:
        reaction_barrier_zpe:
          type: number
          format: double
        imaginary_frequency:
          type: number
          format: double
        reaction_energy_zpe:
          type: number
          format: double
        temperature:
          type: number
          format: double
        input_change_events:
          type: array
          items:
            $ref: '#/components/schemas/TunnelInputChangeEvent'
      required:
      - imaginary_frequency
      - input_change_events
      - reaction_barrier_zpe
      - reaction_energy_zpe
      - temperature
    TunnelResult:
      type: object
      description: Resultado tipado del cálculo Tunnel.
      properties:
        u:
          type: number
          format: double
          description: Factor adimensional U.
        alpha_1:
          type: number
          format: double
          description: Parámetro Alpha 1.
        alpha_2:
          type: number
          format: double
          description: Parámetro Alpha 2.
        g:
          type: number
          format: double
          description: Valor G integrado para corrección túnel.
        kappa_tst:
          type: number
          format: double
          description: Factor de corrección túnel respecto al término clásico exp(-U).
        metadata:
          $ref: '#/components/schemas/TunnelMetadata'
      required:
      - alpha_1
      - alpha_2
      - g
      - kappa_tst
      - metadata
      - u
    UserAppConfig:
      type: object
      description: Serializer CRUD para configuración de app por usuario.
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
        app_name:
          type: string
          maxLength: 80
        config: {}
        updated_at:
          type: string
          format: date-time
          readOnly: true
