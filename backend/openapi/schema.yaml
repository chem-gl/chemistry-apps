          type: string
          readOnly: true
          description: Hash SHA-256 for caching
        plugin_name:
          type: string
          readOnly: true
        algorithm_version:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        is_deleted:
          type: boolean
          description: Expone un flag estable para frontend sin depender de comparar
            timestamps.
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Marca temporal del envío del job a la papelera lógica.
        deleted_by:
          type: integer
          readOnly: true
          nullable: true
        deleted_by_username:
          type: string
          readOnly: true
        deletion_mode:
          allOf:
          - $ref: '#/components/schemas/ScientificJobDeletionModeEnum'
          readOnly: true
          description: |-
            Modo de borrado persistido; vacío cuando el job no está en papelera.

            * `soft` - Soft delete
        scheduled_hard_delete_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Fecha programada para eliminación definitiva automática desde
            la papelera.
        original_status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
          description: |-
            Estado que tenía el job cuando fue enviado a la papelera.

            * `pending` - Pending
            * `running` - Running
            * `paused` - Paused
            * `completed` - Completed
            * `failed` - Failed
            * `cancelled` - Cancelled
        cache_hit:
          type: boolean
          readOnly: true
        cache_miss:
          type: boolean
          readOnly: true
        progress_percentage:
          type: integer
          readOnly: true
          description: Porcentaje de progreso entre 0 y 100.
        progress_stage:
          type: string
          readOnly: true
          description: 'Etapa actual de ejecución: pending/queued/running/paused/caching/completed/failed.'
        progress_message:
          type: string
          readOnly: true
          description: Mensaje corto y legible del estado de progreso.
        progress_event_index:
          type: integer
          readOnly: true
          description: Contador incremental de eventos de progreso emitidos.
        supports_pause_resume:
          type: boolean
          readOnly: true
          description: Indica si el plugin permite pausa cooperativa y reanudación.
        pause_requested:
          type: boolean
          readOnly: true
          description: Marca de control cooperativo para solicitar pausa de ejecución.
        runtime_state:
          readOnly: true
          description: Estado serializable de ejecución para reanudar tareas pausadas.
        paused_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Marca temporal del último momento en que el job quedó en pausa.
        resumed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Marca temporal de la última reanudación explícita del job.
        parameters:
          readOnly: true
        results:
          readOnly: true
          nullable: true
        error_trace:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - algorithm_version
      - cache_hit
      - cache_miss
      - created_at
      - deleted_at
      - deleted_by
      - deleted_by_username
      - deletion_mode
      - error_trace
      - group
      - group_name
      - id
      - is_deleted
      - job_hash
      - original_status
      - owner
      - owner_username
      - parameters
      - pause_requested
      - paused_at
      - plugin_name
      - progress_event_index
      - progress_message
      - progress_percentage
      - progress_stage
      - results
      - resumed_at
      - runtime_state
      - scheduled_hard_delete_at
      - status
      - supports_pause_resume
      - updated_at
