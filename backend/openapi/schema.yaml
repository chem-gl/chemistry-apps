  /api/smileit/jobs/:
    post:
      operationId: smileit_jobs_create
      description: Crea job con bloques resueltos y cobertura total obligatoria.
      summary: Crear Job Smile-it v2
      tags:
      - Smileit
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmileitJobCreateRequest'
            examples:
              GeneraciónPorBloquesMixtos:
                value:
                  version: 2.0.0
                  principal_smiles: c1ccccc1
                  selected_atom_indices:
                  - 0
                  - 1
                  - 2
                  - 3
                  - 4
                  assignment_blocks:
                  - label: Aromatic coverage
                    site_atom_indices:
                    - 0
                    - 1
                    category_keys:
                    - aromatic
                    substituent_refs: []
                    manual_substituents: []
                  - label: Donor tuning
                    site_atom_indices:
                    - 2
                    category_keys:
                    - hbond_donor
                    substituent_refs: []
                    manual_substituents: []
                  - label: Custom lipophilic
                    site_atom_indices:
                    - 3
                    - 4
                    category_keys: []
                    substituent_refs: []
                    manual_substituents:
                    - name: Cyclopropyl
                      smiles: C1CC1
                      anchor_atom_indices:
                      - 0
                      categories:
                      - hydrophobic
                  site_overlap_policy: last_block_wins
                  r_substitutes: 2
                  num_bonds: 1
                  allow_repeated: false
                  max_structures: 600
                  export_name_base: BENZENE_SERIES
                  export_padding: 5
                summary: Generación por bloques mixtos
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SmileitJobCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SmileitJobCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmileitJobResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
