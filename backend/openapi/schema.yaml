components:
  schemas:
    AccessibleScientificApp:
      type: object
      description: Serializer de apps visibles para el usuario actual. Incluye features
        disponibles.
      properties:
        app_name:
          type: string
          readOnly: true
        route_key:
          type: string
          readOnly: true
        api_base_path:
          type: string
          readOnly: true
        supports_pause_resume:
          type: boolean
          readOnly: true
        available_features:
          type: array
          items:
            type: string
          readOnly: true
        enabled:
          type: boolean
          readOnly: true
        group_permission:
          type: boolean
          readOnly: true
          nullable: true
        user_permission:
          type: boolean
          readOnly: true
          nullable: true
      required:
      - api_base_path
      - app_name
      - available_features
      - enabled
      - group_permission
      - route_key
      - supports_pause_resume
      - user_permission
    AccountStatusEnum:
      enum:
      - active
      - inactive
      type: string
      description: |-
        * `active` - Active
        * `inactive` - Inactive
    AppPermission:
      type: object
      description: Serializer CRUD para permisos de app por usuario o por grupo.
      properties:
        id:
          type: integer
          readOnly: true
        app_name:
          type: string
          maxLength: 80
        group:
          type: integer
          nullable: true
        user:
          type: integer
          nullable: true
        is_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - app_name
      - created_at
      - id
      - updated_at
    AppPermissionRequest:
      type: object
      description: Serializer CRUD para permisos de app por usuario o por grupo.
      properties:
        app_name:
          type: string
          minLength: 1
          maxLength: 80
        group:
          type: integer
          nullable: true
        user:
          type: integer
          nullable: true
        is_enabled:
          type: boolean
      required:
      - app_name
    BlankEnum:
      enum:
      - ''
    CadmaCompoundAddRequest:
      type: object
      description: Valida la adición de un compuesto nuevo a una familia existente.
      properties:
        smiles:
          type: string
          minLength: 1
          maxLength: 2000
        name:
          type: string
          maxLength: 200
        paper_reference:
          type: string
          maxLength: 300
        paper_url:
          type: string
          maxLength: 500
        evidence_note:
          type: string
          maxLength: 1000
        toxicity_dt:
          type: number
          format: double
          nullable: true
        toxicity_m:
          type: number
          format: double
          nullable: true
        toxicity_ld50:
          type: number
          format: double
          nullable: true
        sa_score:
          type: number
          format: double
          nullable: true
      required:
      - smiles
    CadmaCompoundRowResponse:
      type: object
      description: Serializer de salida para una fila de compuesto individual.
      properties:
        name:
          type: string
          readOnly: true
        smiles:
          type: string
          readOnly: true
        MW:
          type: number
          format: double
          readOnly: true
        logP:
          type: number
          format: double
          readOnly: true
        MR:
          type: number
          format: double
          readOnly: true
        AtX:
          type: number
          format: double
          readOnly: true
        HBLA:
          type: number
          format: double
          readOnly: true
        HBLD:
          type: number
          format: double
          readOnly: true
        RB:
          type: number
          format: double
          readOnly: true
        PSA:
          type: number
          format: double
          readOnly: true
        DT:
          type: number
          format: double
          readOnly: true
        M:
          type: number
          format: double
          readOnly: true
        LD50:
          type: number
          format: double
          readOnly: true
        SA:
          type: number
          format: double
          readOnly: true
        paper_reference:
          type: string
          readOnly: true
        paper_url:
          type: string
          readOnly: true
        evidence_note:
          type: string
          readOnly: true
      required:
      - AtX
      - DT
      - HBLA
      - HBLD
      - LD50
      - M
      - MR
      - MW
      - PSA
      - RB
      - SA
      - evidence_note
      - logP
      - name
      - paper_reference
      - paper_url
      - smiles
    CadmaPyJobCreateRequest:
      type: object
      description: Valida la creación de un job CADMA Py a partir de una familia y
        CSVs.
      properties:
        reference_library_id:
          type: string
          format: uuid
        project_label:
          type: string
          maxLength: 160
        combined_csv_text:
          type: string
        smiles_csv_text:
          type: string
        toxicity_csv_text:
          type: string
        sa_csv_text:
          type: string
        combined_file:
          type: string
          format: binary
          nullable: true
        smiles_file:
          type: string
          format: binary
          nullable: true
        toxicity_file:
          type: string
          format: binary
          nullable: true
        sa_file:
          type: string
          format: binary
          nullable: true
        source_configs_json:
          type: string
        score_config_json:
          type: string
        start_paused:
          type: boolean
          default: false
      required:
      - reference_library_id
    CadmaPyJobResponse:
      type: object
      description: Serializa un ScientificJob completo para CADMA Py.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        owner:
          type: integer
          nullable: true
        group:
          type: integer
          nullable: true
        plugin_name:
          type: string
          maxLength: 100
        algorithm_version:
          type: string
          maxLength: 50
        status:
          $ref: '#/components/schemas/StatusEnum'
        parameters: {}
        results:
          nullable: true
        error_trace:
          type: string
        progress_message:
          type: string
          description: Mensaje corto y legible del estado de progreso.
          maxLength: 255
        progress_percentage:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Porcentaje de progreso entre 0 y 100.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
