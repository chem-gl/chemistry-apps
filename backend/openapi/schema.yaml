          type: integer
          minimum: 0
        hbond_donors:
          type: integer
          minimum: 0
        hbond_acceptors:
          type: integer
          minimum: 0
        tpsa:
          type: number
          format: double
        aromatic_rings:
          type: integer
          minimum: 0
      required:
      - aromatic_rings
      - clogp
      - hbond_acceptors
      - hbond_donors
      - molecular_weight
      - rotatable_bonds
      - tpsa
    SmileitResolvedAssignmentBlock:
      type: object
      description: Bloque normalizado persistido dentro de parámetros del job.
      properties:
        label:
          type: string
          maxLength: 120
        priority:
          type: integer
          minimum: 1
        site_atom_indices:
          type: array
          items:
            type: integer
            minimum: 0
        resolved_substituents:
          type: array
          items:
            $ref: '#/components/schemas/SmileitResolvedSubstituent'
      required:
      - label
      - priority
      - resolved_substituents
      - site_atom_indices
    SmileitResolvedSubstituent:
      type: object
      description: Sustituyente normalizado que participa en la ejecución del plugin.
      properties:
        source_kind:
          $ref: '#/components/schemas/SourceKindEnum'
        stable_id:
          type: string
        version:
          type: integer
          minimum: 1
        name:
          type: string
          maxLength: 120
        smiles:
          type: string
          maxLength: 2000
        selected_atom_index:
          type: integer
          minimum: 0
        categories:
          type: array
          items:
            type: string
            maxLength: 80
            pattern: ^[-a-zA-Z0-9_]+$
      required:
      - categories
      - name
      - selected_atom_index
      - smiles
      - source_kind
      - stable_id
      - version
    SmileitResult:
      type: object
      description: Resultado final de generación combinatoria y exportes reproducibles.
      properties:
        total_generated:
          type: integer
          minimum: 0
        generated_structures:
          type: array
          items:
            $ref: '#/components/schemas/SmileitGeneratedStructure'
        traceability_rows:
          type: array
          items:
            $ref: '#/components/schemas/SmileitTraceabilityRow'
        truncated:
          type: boolean
          default: false
        principal_smiles:
          type: string
          maxLength: 2000
        selected_atom_indices:
          type: array
          items:
            type: integer
            minimum: 0
        export_name_base:
          type: string
          default: SMILEIT
          maxLength: 120
        export_padding:
          type: integer
          maximum: 9
          minimum: 3
          default: 5
        references:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              additionalProperties: {}
      required:
      - principal_smiles
      - selected_atom_indices
      - total_generated
    SmileitStructuralAnnotation:
      type: object
      description: Región anotada en la estructura principal con tooltip/caption.
      properties:
        pattern_stable_id:
          type: string
        pattern_version:
          type: integer
          minimum: 1
        name:
          type: string
          maxLength: 140
        pattern_type:
          $ref: '#/components/schemas/PatternTypeEnum'
        caption:
          type: string
          maxLength: 300
        atom_indices:
          type: array
          items:
            type: integer
            minimum: 0
        color:
          type: string
          maxLength: 16
      required:
      - atom_indices
      - caption
      - color
      - name
      - pattern_stable_id
      - pattern_type
      - pattern_version
    SmileitStructureInspectionRequestRequest:
      type: object
      description: Entrada para inspección de estructura y anotación automática.
      properties:
        smiles:
          type: string
          minLength: 1
          maxLength: 2000
      required:
      - smiles
    SmileitStructureInspectionResponse:
      type: object
      description: Respuesta enriquecida de inspección molecular para la UI.
      properties:
        canonical_smiles:
          type: string
          maxLength: 2000
        atom_count:
          type: integer
          minimum: 1
        atoms:
          type: array
          items:
            $ref: '#/components/schemas/SmileitAtomInfo'
        svg:
          type: string
        quick_properties:
          $ref: '#/components/schemas/SmileitQuickProperties'
        annotations:
          type: array
          items:
            $ref: '#/components/schemas/SmileitStructuralAnnotation'
        active_pattern_refs:
          type: array
          items:
            $ref: '#/components/schemas/SmileitPatternReference'
      required:
      - active_pattern_refs
      - annotations
      - atom_count
      - atoms
      - canonical_smiles
      - quick_properties
      - svg
    SmileitSubstituentReferenceInputRequest:
      type: object
      description: Referencia inmutable a sustituyente por stable_id + version.
      properties:
        stable_id:
          type: string
          format: uuid
        version:
          type: integer
          minimum: 1
      required:
      - stable_id
      - version
    SmileitSubstitutionTraceEvent:
      type: object
      description: Evento de sustitución aplicado en un derivado generado.
      properties:
        round_index:
          type: integer
          minimum: 1
        site_atom_index:
          type: integer
          minimum: 0
        block_label:
          type: string
          maxLength: 120
        block_priority:
          type: integer
          minimum: 1
        substituent_name:
          type: string
          maxLength: 120
        substituent_smiles:
          type: string
          default: ''
          maxLength: 2000
        substituent_stable_id:
          type: string
        substituent_version:
          type: integer
          minimum: 1
        source_kind:
          $ref: '#/components/schemas/SourceKindEnum'
        bond_order:
          type: integer
          maximum: 3
          minimum: 1
      required:
      - block_label
      - block_priority
      - bond_order
      - round_index
      - site_atom_index
      - source_kind
      - substituent_name
      - substituent_stable_id
      - substituent_version
    SmileitTraceabilityRow:
      type: object
      description: Fila para auditoría de sitio -> sustituyente aplicado por derivado.
      properties:
        derivative_name:
          type: string
          maxLength: 500
        derivative_smiles:
          type: string
          maxLength: 2000
        round_index:
          type: integer
          minimum: 1
        site_atom_index:
          type: integer
          minimum: 0
        block_label:
          type: string
          maxLength: 120
        block_priority:
          type: integer
          minimum: 1
        substituent_name:
          type: string
          maxLength: 120
        substituent_smiles:
          type: string
          default: ''
          maxLength: 2000
        substituent_stable_id:
          type: string
        substituent_version:
          type: integer
          minimum: 1
        source_kind:
          type: string
          maxLength: 20
        bond_order:
          type: integer
          maximum: 3
          minimum: 1
      required:
      - block_label
      - block_priority
      - bond_order
      - derivative_name
      - derivative_smiles
      - round_index
      - site_atom_index
      - source_kind
      - substituent_name
      - substituent_stable_id
      - substituent_version
    SolventEnum:
      enum:
      - Benzene
      - Gas phase (Air)
      - Pentyl ethanoate
      - Water
      - Other
      type: string
      description: "* `` - \n* `Benzene` - Benzene\n* `Gas phase (Air)` - Gas phase
        (Air)\n* `Pentyl ethanoate` - Pentyl ethanoate\n* `Water` - Water\n* `Other`
        - Other"
    SourceFieldEnum:
      enum:
      - reactant_1_file
      - reactant_2_file
      - transition_state_file
      - product_1_file
      - product_2_file
      type: string
      description: |-
        * `reactant_1_file` - reactant_1_file
        * `reactant_2_file` - reactant_2_file
        * `transition_state_file` - transition_state_file
        * `product_1_file` - product_1_file
        * `product_2_file` - product_2_file
    SourceKindEnum:
      enum:
      - catalog
      - manual
      type: string
      description: |-
        * `catalog` - catalog
        * `manual` - manual
    StatusEnum:
      enum:
      - pending
      - running
      - paused
      - completed
      - failed
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `running` - Running
        * `paused` - Paused
        * `completed` - Completed
        * `failed` - Failed
        * `cancelled` - Cancelled
    ToxicityJobCreateRequest:
      type: object
      description: Valida la creación de un job toxicológico por lista de SMILES.
      properties:
        smiles:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 4096
          description: Lista de SMILES a evaluar. No se aplica límite de negocio;
            el procesamiento es por bloques internos.
          minItems: 1
        version:
          type: string
          minLength: 1
          default: 1.0.0
          description: Versión de algoritmo a persistir en el job.
          maxLength: 20
      required:
      - smiles
    ToxicityJobResponse:
      type: object
      description: Serializa un ScientificJob para la app Toxicity Properties.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        status:
          $ref: '#/components/schemas/StatusEnum'
        progress_percentage:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Porcentaje de progreso entre 0 y 100.
        progress_stage:
          type: string
          description: 'Etapa actual de ejecución: pending/queued/running/paused/caching/completed/failed.'
          maxLength: 40
        progress_message:
          type: string
          description: Mensaje corto y legible del estado de progreso.
          maxLength: 255
        parameters: {}
        results:
          allOf:
          - $ref: '#/components/schemas/ToxicityResults'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - results
      - updated_at
    ToxicityMoleculeResult:
      type: object
      description: Serializa una fila de la tabla de propiedades toxicológicas.
      properties:
        smiles:
          type: string
          readOnly: true
        LD50_mgkg:
          type: number
          format: double
          readOnly: true
          nullable: true
        mutagenicity:
          type: string
          readOnly: true
          nullable: true
        ames_score:
          type: number
          format: double
          readOnly: true
          nullable: true
        DevTox:
          type: string
          readOnly: true
          nullable: true
        devtox_score:
          type: number
          format: double
          readOnly: true
          nullable: true
        error_message:
          type: string
          readOnly: true
          nullable: true
      required:
      - DevTox
      - LD50_mgkg
      - ames_score
      - devtox_score
      - error_message
      - mutagenicity
      - smiles
    ToxicityResults:
      type: object
      description: Serializa el bloque total de resultados del job toxicológico.
      properties:
        molecules:
          type: array
          items:
            $ref: '#/components/schemas/ToxicityMoleculeResult'
          readOnly: true
        total:
          type: integer
          readOnly: true
        scientific_references:
          type: array
          items:
            type: string
          readOnly: true
      required:
      - molecules
      - scientific_references
      - total
    TunnelInputChangeEvent:
      type: object
      description: Evento individual de modificación de entradas.
      properties:
        field_name:
          type: string
          maxLength: 100
        previous_value:
          type: number
          format: double
        new_value:
          type: number
          format: double
        changed_at:
          type: string
          maxLength: 80
      required:
      - changed_at
      - field_name
      - new_value
      - previous_value
    TunnelJobCreateRequest:
      type: object
      description: Valida parámetros de creación para jobs de efecto túnel.
      properties:
        version:
          type: string
          minLength: 1
          default: 2.0.0
          maxLength: 50
        reaction_barrier_zpe:
          type: number
          format: double
          description: Reaction barrier ZPE en kcal/mol.
        imaginary_frequency:
          type: number
          format: double
          description: Imaginary frequency en cm^-1 (sin signo negativo).
        reaction_energy_zpe:
          type: number
          format: double
          description: Reaction energy ZPE en kcal/mol.
        temperature:
          type: number
          format: double
          description: Temperatura en Kelvin.
        input_change_events:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Eventos de modificación de entradas capturados en frontend.
          maxItems: 2000
      required:
      - imaginary_frequency
      - reaction_barrier_zpe
      - reaction_energy_zpe
      - temperature
    TunnelJobResponse:
      type: object
      description: Respuesta estable para jobs de la app Tunnel.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        job_hash:
          type: string
          readOnly: true
          description: Hash SHA-256 for caching
        plugin_name:
          type: string
          readOnly: true
        algorithm_version:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        cache_hit:
          type: boolean
          readOnly: true
        cache_miss:
          type: boolean
          readOnly: true
        progress_percentage:
          type: integer
          readOnly: true
          description: Porcentaje de progreso entre 0 y 100.
        progress_stage:
          type: string
          readOnly: true
          description: 'Etapa actual de ejecución: pending/queued/running/paused/caching/completed/failed.'
        progress_message:
          type: string
          readOnly: true
          description: Mensaje corto y legible del estado de progreso.
        progress_event_index:
          type: integer
          readOnly: true
          description: Contador incremental de eventos de progreso emitidos.
        parameters:
          $ref: '#/components/schemas/TunnelParameters'
        results:
          allOf:
          - $ref: '#/components/schemas/TunnelResult'
          nullable: true
        error_trace:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - algorithm_version
      - cache_hit
      - cache_miss
      - created_at
      - error_trace
      - id
      - job_hash
      - parameters
      - plugin_name
      - progress_event_index
      - progress_message
      - progress_percentage
      - progress_stage
      - status
      - updated_at
    TunnelMetadata:
      type: object
      description: Metadatos técnicos de resultado Tunnel.
      properties:
        model_name:
          type: string
          maxLength: 120
        source_library:
          type: string
          maxLength: 120
        units:
          type: object
          additionalProperties:
            type: string
        input_event_count:
          type: integer
          minimum: 0
      required:
      - input_event_count
      - model_name
      - source_library
      - units
    TunnelParameters:
      type: object
      description: Parámetros persistidos de entrada para un job Tunnel.
      properties:
        reaction_barrier_zpe:
          type: number
          format: double
        imaginary_frequency:
          type: number
          format: double
        reaction_energy_zpe:
          type: number
          format: double
        temperature:
          type: number
          format: double
        input_change_events:
          type: array
          items:
            $ref: '#/components/schemas/TunnelInputChangeEvent'
      required:
      - imaginary_frequency
      - input_change_events
      - reaction_barrier_zpe
      - reaction_energy_zpe
      - temperature
    TunnelResult:
      type: object
      description: Resultado tipado del cálculo Tunnel.
      properties:
        u:
          type: number
          format: double
          description: Factor adimensional U.
        alpha_1:
          type: number
          format: double
          description: Parámetro Alpha 1.
        alpha_2:
          type: number
          format: double
          description: Parámetro Alpha 2.
        g:
          type: number
          format: double
          description: Valor G integrado para corrección túnel.
        kappa_tst:
          type: number
          format: double
          description: Factor de corrección túnel respecto al término clásico exp(-U).
        metadata:
          $ref: '#/components/schemas/TunnelMetadata'
      required:
      - alpha_1
      - alpha_2
      - g
      - kappa_tst
      - metadata
      - u
    VerificationRuleEnum:
      enum:
      - aromatic
      - hbond_donor
      - hbond_acceptor
      - hydrophobic
      - smarts
      type: string
      description: |-
        * `aromatic` - aromatic
        * `hbond_donor` - hbond_donor
        * `hbond_acceptor` - hbond_acceptor
        * `hydrophobic` - hydrophobic
        * `smarts` - smarts
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
servers:
- url: http://localhost:8000
  description: Entorno local por hostname
- url: http://127.0.0.1:8000
  description: Entorno local por loopback
tags:
- name: Jobs
  description: Operaciones genéricas para consulta, progreso, eventos SSE y logs de
    jobs.
- name: Calculator
  description: Endpoints de ejecución para operaciones matemáticas de calculadora
    científica.
- name: RandomNumbers
  description: Endpoints de generación por lotes de números aleatorios con semilla
    externa.
- name: MolarFractions
  description: Endpoints para cálculo asíncrono de fracciones molares en equilibrio
    ácido-base.
- name: Tunnel
  description: Endpoints para cálculo del efecto túnel con teoría de Eckart asimétrica
    y trazabilidad de cambios de entrada.
- name: EasyRate
  description: Endpoints para cinética Easy-rate con carga de archivos Gaussian y
    persistencia de entradas para reproducibilidad.
- name: Marcus
  description: Endpoints para cinética por modelo Marcus con carga multipart y persistencia
    de entradas reproducibles.
- name: ToxicityProperties
  description: Endpoints para predicción toxicológica con ADMET-AI (LD50, Ames y DevTox)
    en jobs asíncronos.
