components:
  schemas:
    BlankEnum:
      enum:
      - ''
    CalculatorJobCreateRequest:
      type: object
      description: |-
        Define parámetros estrictos para crear un job de calculadora.

        Este serializer protege el contrato antes de llegar al plugin. Así se evita
        encolar trabajos que no cumplirán reglas mínimas de dominio.
      properties:
        version:
          type: string
          minLength: 1
          default: '1.0'
          description: Versión del algoritmo calculadora.
          maxLength: 50
        op:
          allOf:
          - $ref: '#/components/schemas/CalculatorOperationEnum'
          description: |-
            Operación aritmética a ejecutar.

            * `add` - add
            * `sub` - sub
            * `mul` - mul
            * `div` - div
            * `pow` - pow
            * `factorial` - factorial
        a:
          type: number
          format: double
          description: Primer operando numérico.
        b:
          type: number
          format: double
          nullable: true
          description: Segundo operando numérico. Es obligatorio para add/sub/mul/div/pow
            y no debe enviarse para factorial.
      required:
      - a
      - op
    CalculatorJobResponse:
      type: object
      description: |-
        Respuesta tipada para jobs de calculadora consumibles por frontend.

        Mantiene consistencia con el modelo de jobs de core y permite a clientes
        consumir resultados sin interpretar estructuras dinámicas ad-hoc.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        job_hash:
          type: string
          readOnly: true
          description: Hash SHA-256 for caching
        plugin_name:
          type: string
          readOnly: true
        algorithm_version:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        cache_hit:
          type: boolean
          readOnly: true
        cache_miss:
          type: boolean
          readOnly: true
        parameters:
          $ref: '#/components/schemas/CalculatorParameters'
        results:
          allOf:
          - $ref: '#/components/schemas/CalculatorResult'
          nullable: true
        error_trace:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - algorithm_version
      - cache_hit
      - cache_miss
      - created_at
      - error_trace
      - id
      - job_hash
      - parameters
      - plugin_name
      - status
      - updated_at
    CalculatorOperationEnum:
      enum:
      - add
      - sub
      - mul
      - div
      - pow
      - factorial
      type: string
      description: |-
        * `add` - add
        * `sub` - sub
        * `mul` - mul
        * `div` - div
        * `pow` - pow
        * `factorial` - factorial
    CalculatorParameters:
      type: object
      description: Estructura de parámetros persistidos para el job calculadora.
      properties:
        op:
          $ref: '#/components/schemas/CalculatorOperationEnum'
        a:
          type: number
          format: double
          description: Primer operando almacenado para trazabilidad.
        b:
          type: number
          format: double
          nullable: true
          description: Segundo operando cuando aplica; ausente o nulo para factorial.
      required:
      - a
      - op
    CalculatorResult:
      type: object
      description: Resultado estricto del plugin calculadora.
      properties:
        final_result:
          type: number
          format: double
        metadata:
          $ref: '#/components/schemas/CalculatorResultMetadata'
      required:
      - final_result
      - metadata
    CalculatorResultMetadata:
      type: object
      description: Metadatos de trazabilidad del resultado de calculadora.
      properties:
        operation_used:
          allOf:
          - $ref: '#/components/schemas/CalculatorOperationEnum'
          description: |-
            Operación utilizada por el plugin para obtener el resultado.

            * `add` - add
            * `sub` - sub
            * `mul` - mul
            * `div` - div
            * `pow` - pow
            * `factorial` - factorial
        operand_a:
          type: number
          format: double
          description: Valor de entrada del operando a.
        operand_b:
          type: number
          format: double
          nullable: true
          description: Valor de entrada del operando b cuando aplica.
      required:
      - operand_a
      - operand_b
      - operation_used
    EasyRateArtifactDescriptor:
      type: object
      description: Descriptor de archivo usado para trazabilidad en parámetros del
        job.
      properties:
        field_name:
          type: string
          maxLength: 80
        original_filename:
          type: string
          maxLength: 255
        content_type:
          type: string
          maxLength: 120
        sha256:
          type: string
          maxLength: 64
        size_bytes:
          type: integer
          minimum: 0
      required:
      - content_type
      - field_name
      - original_filename
      - sha256
      - size_bytes
    EasyRateInspectionExecution:
      type: object
      description: Resumen de una ejecución candidata detectada durante la inspección.
      properties:
        source_field:
          type: string
          maxLength: 80
        original_filename:
          type: string
          nullable: true
          maxLength: 255
        execution_index:
          type: integer
          minimum: 0
        job_title:
          type: string
          nullable: true
          maxLength: 255
        checkpoint_file:
          type: string
          nullable: true
          maxLength: 255
        charge:
          type: integer
        multiplicity:
          type: integer
        free_energy:
          type: number
          format: double
          nullable: true
        thermal_enthalpy:
          type: number
          format: double
          nullable: true
        zero_point_energy:
          type: number
          format: double
          nullable: true
        scf_energy:
          type: number
          format: double
          nullable: true
        temperature:
          type: number
          format: double
          nullable: true
        negative_frequencies:
          type: integer
          minimum: 0
        imaginary_frequency:
          type: number
          format: double
          nullable: true
        normal_termination:
          type: boolean
        is_opt_freq:
          type: boolean
        is_valid_for_role:
          type: boolean
        validation_errors:
          type: array
          items:
            type: string
      required:
      - charge
      - checkpoint_file
      - execution_index
      - free_energy
      - imaginary_frequency
      - is_opt_freq
      - is_valid_for_role
      - job_title
      - multiplicity
      - negative_frequencies
      - normal_termination
      - original_filename
      - scf_energy
      - source_field
      - temperature
      - thermal_enthalpy
      - validation_errors
      - zero_point_energy
    EasyRateInspectionRequestRequest:
      type: object
      description: Serializer de inspección previa de un archivo Gaussian de Easy-rate.
      properties:
        source_field:
          $ref: '#/components/schemas/SourceFieldEnum'
        gaussian_file:
          type: string
          format: binary
      required:
      - gaussian_file
      - source_field
    EasyRateInspectionResponse:
      type: object
      description: Resultado agregado de la inspección previa de un archivo Easy-rate.
      properties:
        source_field:
          type: string
          maxLength: 80
        original_filename:
          type: string
          nullable: true
          maxLength: 255
        parse_errors:
          type: array
          items:
            type: string
        execution_count:
          type: integer
          minimum: 0
        default_execution_index:
          type: integer
          nullable: true
        executions:
          type: array
          items:
            $ref: '#/components/schemas/EasyRateInspectionExecution'
      required:
      - default_execution_index
      - execution_count
      - executions
      - original_filename
      - parse_errors
      - source_field
    EasyRateJobCreateRequest:
      type: object
      description: Serializer de entrada para creación de jobs Easy-rate.
      properties:
        version:
          type: string
          minLength: 1
          default: 2.0.0
          maxLength: 50
        title:
          type: string
          minLength: 1
          default: Title
          maxLength: 160
        reaction_path_degeneracy:
          type: number
          format: double
          minimum: 1.0e-12
          default: 1.0
        cage_effects:
          type: boolean
          default: false
        diffusion:
          type: boolean
          default: false
        solvent:
          default: ''
          oneOf:
          - $ref: '#/components/schemas/SolventEnum'
          - $ref: '#/components/schemas/BlankEnum'
        custom_viscosity:
          type: number
          format: double
          nullable: true
        radius_reactant_1:
          type: number
          format: double
          nullable: true
        radius_reactant_2:
          type: number
          format: double
          nullable: true
        reaction_distance:
          type: number
          format: double
          nullable: true
        print_data_input:
          type: boolean
          default: false
        reactant_1_execution_index:
          type: integer
          minimum: 0
          nullable: true
        reactant_2_execution_index:
          type: integer
          minimum: 0
          nullable: true
        transition_state_execution_index:
          type: integer
          minimum: 0
          nullable: true
        product_1_execution_index:
          type: integer
          minimum: 0
          nullable: true
        product_2_execution_index:
          type: integer
          minimum: 0
          nullable: true
        reactant_1_file:
          type: string
          format: binary
        reactant_2_file:
          type: string
          format: binary
        transition_state_file:
          type: string
          format: binary
        product_1_file:
          type: string
          format: binary
          nullable: true
        product_2_file:
          type: string
          format: binary
          nullable: true
      required:
      - reactant_1_file
      - reactant_2_file
      - transition_state_file
    EasyRateJobResponse:
      type: object
      description: Serializer de salida para jobs de la app Easy-rate.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        job_hash:
          type: string
          readOnly: true
          description: Hash SHA-256 for caching
        plugin_name:
          type: string
          readOnly: true
        algorithm_version:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        cache_hit:
          type: boolean
          readOnly: true
        cache_miss:
          type: boolean
          readOnly: true
        progress_percentage:
          type: integer
          readOnly: true
          description: Porcentaje de progreso entre 0 y 100.
        progress_stage:
          type: string
          readOnly: true
          description: 'Etapa actual de ejecución: pending/queued/running/paused/caching/completed/failed.'
        progress_message:
          type: string
          readOnly: true
          description: Mensaje corto y legible del estado de progreso.
        progress_event_index:
          type: integer
          readOnly: true
          description: Contador incremental de eventos de progreso emitidos.
        parameters:
