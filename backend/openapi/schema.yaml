  /api/tunnel/jobs/:
    post:
      operationId: tunnel_jobs_create
      description: Crea un job asíncrono para calcular el efecto túnel usando teoría
        de Eckart asimétrica y librería CK_TEST.
      summary: Crear Job de Tunnel
      tags:
      - Tunnel
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TunnelJobCreateRequest'
            examples:
              CrearJobTunnelConTrazabilidadDeCambios:
                value:
                  version: 2.0.0
                  reaction_barrier_zpe: 3.5
                  imaginary_frequency: 625.0
                  reaction_energy_zpe: -8.2
                  temperature: 298.15
                  input_change_events:
                  - field_name: reaction_barrier_zpe
                    previous_value: 0.0
                    new_value: 3.5
                    changed_at: '2026-03-12T10:01:10.000Z'
                  - field_name: imaginary_frequency
                    previous_value: 0.0
                    new_value: 625.0
                    changed_at: '2026-03-12T10:01:19.000Z'
                summary: Crear job Tunnel con trazabilidad de cambios
                description: Calcula el efecto túnel con teoría de barrera de Eckart
                  asimétrica y registra eventos de edición de entradas para auditoría.
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TunnelJobCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TunnelJobCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '201':
