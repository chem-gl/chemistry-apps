openapi: 3.0.3
info:
  title: Chemistry Apps API
  version: 1.0.0
  description: API de plataforma científica modular para ejecutar jobs asíncronos
    por plugins (calculator, random-numbers y molar-fractions), con observabilidad
    de progreso y logs en tiempo real, cache por hash y recuperación activa automática.
  contact:
    name: Chemistry Apps Team
    url: https://github.com/chem-gl/chemistry-apps
  license:
    name: MIT
    url: https://opensource.org/license/mit/
paths:
  /api/calculator/jobs/:
    post:
      operationId: calculator_jobs_create
      description: Recibe parámetros estrictos de calculadora y despacha el trabajo
        en background cuando no existe caché.
      summary: Crear Job de Calculadora
      tags:
      - Calculator
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculatorJobCreateRequest'
            examples:
              CrearJobCalculadoraPotencia:
                value:
                  version: 1.0.0
                  op: pow
                  a: 2.0
                  b: 8.0
                summary: Crear job calculadora potencia
                description: 'Contrato estricto para potencia: resultado 2^8.'
              CrearJobCalculadoraFactorial:
                value:
                  version: 1.0.0
                  op: factorial
                  a: 5.0
                summary: Crear job calculadora factorial
                description: 'Contrato estricto para factorial: solo usa el campo
                  a.'
              CrearJobCalculadoraBásico:
                value:
                  version: 1.0.0
                  op: add
                  a: 5.0
                  b: 3.0
                summary: Crear job calculadora básico
                description: Contrato estricto para crear un job de calculadora.
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CalculatorJobCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CalculatorJobCreateRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculatorJobResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                FactorialInválido:
                  value:
                    a:
                    - Para factorial, a debe ser un entero no negativo.
                  summary: Factorial inválido
                OperaciónBinariaSinB:
                  value:
                    b:
                    - El campo b es obligatorio para operaciones binarias.
                  summary: Operación binaria sin b
          description: Error de validación del contrato de calculadora.
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: No fue posible encolar o crear el job.
  /api/calculator/jobs/{id}/:
    get:
      operationId: calculator_jobs_retrieve
      description: Devuelve estado y resultado del job de calculadora por UUID.
      summary: Consultar Job de Calculadora
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job de calculadora.
        required: true
      tags:
      - Calculator
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculatorJobResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job de calculadora no encontrado.
  /api/calculator/jobs/{id}/report-csv/:
    get:
      operationId: calculator_jobs_report_csv_retrieve
      description: Descarga un CSV con operación usada, operandos y resultado final.
        Solo aplica para jobs en estado completed.
      summary: Descargar Reporte CSV de Calculadora
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this scientific job.
        required: true
      tags:
      - Calculator
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: Archivo CSV construido desde resultados del job.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job de calculadora no encontrado.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: El estado del job no permite exportación CSV.
  /api/calculator/jobs/{id}/report-error/:
    get:
      operationId: calculator_jobs_report_error_retrieve
      description: Descarga un reporte de error para jobs failed con error_trace.
        Incluye parámetros de entrada y detalle del fallo.
      summary: Descargar Reporte de Error de Calculadora
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this scientific job.
        required: true
      tags:
      - Calculator
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: Archivo de texto con contexto del error.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job de calculadora no encontrado.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: El job no tiene un error exportable.
  /api/calculator/jobs/{id}/report-log/:
    get:
      operationId: calculator_jobs_report_log_retrieve
      description: Descarga un log técnico con parámetros de entrada, estado, resultados
        y eventos de ejecución.
      summary: Descargar Reporte LOG de Calculadora
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this scientific job.
        required: true
      tags:
      - Calculator
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: Archivo de texto con trazabilidad del job.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job de calculadora no encontrado.
  /api/easy-rate/jobs/:
    post:
      operationId: easy_rate_jobs_create
      description: Crea un job asíncrono Easy-rate a partir de archivos Gaussian cargados
        en multipart y parámetros de ejecución.
      summary: Crear Job Easy-rate
      tags:
      - EasyRate
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EasyRateJobCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EasyRateJobCreateRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EasyRateJobResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error de validación en create multipart.
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: No fue posible crear o encolar el job.
  /api/easy-rate/jobs/{id}/:
    get:
      operationId: easy_rate_jobs_retrieve
      description: Devuelve estado, progreso y resultados del job por UUID.
      summary: Consultar Job Easy-rate
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job Easy-rate.
        required: true
      tags:
      - EasyRate
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EasyRateJobResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job Easy-rate no encontrado.
  /api/easy-rate/jobs/{id}/report-csv/:
    get:
      operationId: easy_rate_jobs_report_csv_retrieve
      description: Descarga CSV con parámetros clave y resultados principales. Solo
        aplica para jobs completed.
      summary: Descargar Reporte CSV de Easy-rate
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this scientific job.
        required: true
      tags:
      - EasyRate
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: Archivo CSV generado a partir del job Easy-rate.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job Easy-rate no encontrado.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: El estado del job no permite exportación CSV.
  /api/easy-rate/jobs/{id}/report-error/:
    get:
      operationId: easy_rate_jobs_report_error_retrieve
      description: Descarga reporte de error con parámetros y traza de fallo.
      summary: Descargar Reporte de Error de Easy-rate
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this scientific job.
        required: true
      tags:
      - EasyRate
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: Archivo de texto con detalle del fallo del job.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job Easy-rate no encontrado.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: El job no tiene un error exportable.
  /api/easy-rate/jobs/{id}/report-inputs/:
    get:
      operationId: easy_rate_jobs_report_inputs_retrieve
      description: Descarga ZIP con todos los archivos de entrada persistidos y manifest.json
        para reproducibilidad/reintento.
      summary: Descargar Entradas Originales de Easy-rate
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this scientific job.
        required: true
      tags:
      - EasyRate
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: Archivo ZIP con entradas persistidas del job.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job Easy-rate no encontrado.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: No existen artefactos de entrada persistidos.
  /api/easy-rate/jobs/{id}/report-log/:
    get:
      operationId: easy_rate_jobs_report_log_retrieve
      description: Descarga log técnico con parámetros, resultados y eventos persistidos.
      summary: Descargar Reporte LOG de Easy-rate
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this scientific job.
        required: true
      tags:
      - EasyRate
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: Archivo de texto con trazabilidad completa del job.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job Easy-rate no encontrado.
  /api/jobs/:
    get:
      operationId: jobs_list
      description: Devuelve el listado de jobs científicos registrados en todas las
        apps, incluyendo su estado actual. Permite filtros opcionales por plugin y
        estado.
      summary: Listar Jobs Científicos
      parameters:
      - in: query
        name: plugin_name
        schema:
          type: string
        description: Filtra por nombre de plugin/app científica.
      - in: query
        name: status
        schema:
          type: string
        description: 'Filtra por estado del job. Valores válidos: pending, running,
          paused, completed, failed.'
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScientificJob'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                EstadoInválido:
                  value:
                    detail: 'Invalid status filter. Allowed values are: pending, running,
                      paused, completed, failed.'
                  summary: Estado inválido
          description: Filtro de estado inválido.
    post:
      operationId: jobs_create
      description: Evalua reglas de hashing/caching y despacha al worker Celery solo
        cuando el job no tiene cache disponible.
      summary: Despachar Job Científico
      tags:
      - Jobs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
            examples:
              EjemploDeCreaciónDeJob:
                value:
                  plugin_name: calculator
                  version: '1.0'
                  parameters:
                    op: add
                    a: 5
                    b: 3
                summary: Ejemplo de Creación de Job
                description: Creación de una tarea matemática en background.
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScientificJob'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ErrorPluginNoRegistrado:
                  value:
                    detail: Plugin requested is not registered
                  summary: Error plugin no registrado
          description: Error de validacion en parametros.
  /api/jobs/{id}/:
    get:
      operationId: jobs_retrieve
      description: Recupera todo el estado guardado incluyendo outputs una vez finalizado
        el trabajo subyacente.
      summary: Consultar Estado y Resultados de un Job
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job cientifico a consultar.
        required: true
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScientificJob'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: El trabajo no pudo ser encontrado en el Registry local.
  /api/jobs/{id}/cancel/:
    post:
      operationId: jobs_cancel_create
      description: Cancela un job en estado pending, running o paused de forma inmediata
        e irreversible. No es posible reactivar un job cancelado. Los jobs en estado
        completed, failed o cancelled no pueden ser cancelados.
      summary: Cancelar un Job (irreversible)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job científico.
        required: true
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobControlActionResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                JobYaFinalizado:
                  value:
                    detail: 'No es posible cancelar un job en estado terminal (estado
                      actual: completed).'
                  summary: Job ya finalizado
          description: El job está en estado terminal y no puede cancelarse.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
  /api/jobs/{id}/events/:
    get:
      operationId: jobs_events_retrieve
      description: Abre un stream Server-Sent Events para recibir actualizaciones
        de progreso en tiempo real hasta completar/fallar o alcanzar timeout.
      summary: Suscribirse a eventos de progreso de un Job (SSE)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job científico.
        required: true
      - in: query
        name: timeout_seconds
        schema:
          type: integer
        description: 'Tiempo máximo del stream SSE en segundos. Valor por defecto:
          30.'
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                EventoSSE:
                  value: |+
                    id: 4
                    event: job.progress
                    data: {"job_id":"8ca8c1fa-1f2f-4a13-9038-9e1be7d0ce24","status":"running","progress_percentage":35,"progress_stage":"running","progress_message":"Ejecutando plugin científico.","progress_event_index":4,"updated_at":"2026-03-10T12:00:00Z"}

                  summary: Evento SSE
          description: Flujo SSE de eventos job.progress con id incremental.
        '404':
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
  /api/jobs/{id}/logs/:
    get:
      operationId: jobs_logs_retrieve
      description: Devuelve eventos de log persistidos para un job en orden ascendente
        por event_index, con soporte de cursor incremental y límite de página.
      summary: Consultar historial de logs de un Job
      parameters:
      - in: query
        name: after_event_index
        schema:
          type: integer
        description: Retorna eventos con índice mayor al valor indicado.
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job científico.
        required: true
      - in: query
        name: limit
        schema:
          type: integer
        description: Cantidad máxima de eventos a devolver. Máximo 500.
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobLogList'
              examples:
                ListadoDeLogsPorJob:
                  value:
                    job_id: 8ca8c1fa-1f2f-4a13-9038-9e1be7d0ce24
                    count: 2
                    next_after_event_index: 13
                    results:
                    - job_id: 8ca8c1fa-1f2f-4a13-9038-9e1be7d0ce24
                      event_index: 12
                      level: info
                      source: random_numbers.plugin
                      message: Procesando lote de generación.
                      payload:
                        current_batch_size: 5
                      created_at: '2026-03-11T10:25:00Z'
                    - job_id: 8ca8c1fa-1f2f-4a13-9038-9e1be7d0ce24
                      event_index: 13
                      level: debug
                      source: random_numbers.plugin
                      message: Número generado correctamente.
                      payload:
                        generated_number: 1024
                      created_at: '2026-03-11T10:25:01Z'
                  summary: Listado de logs por job
                  description: Página de logs de ejecución de un job.
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
  /api/jobs/{id}/logs/events/:
    get:
      operationId: jobs_logs_events_retrieve
      description: Abre un stream Server-Sent Events para recibir logs en tiempo real
        hasta timeout o finalización del job.
      summary: Suscribirse a logs de un Job (SSE)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job científico.
        required: true
      - in: query
        name: timeout_seconds
        schema:
          type: integer
        description: 'Tiempo máximo del stream SSE en segundos. Valor por defecto:
          30.'
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                EventoSSEDeLog:
                  value: |+
                    id: 12
                    event: job.log
                    data: {"job_id":"8ca8c1fa-1f2f-4a13-9038-9e1be7d0ce24","event_index":12,"level":"info","source":"random_numbers.plugin","message":"Procesando lote de generación.","payload":{"current_batch_size":5},"created_at":"2026-03-11T10:25:00Z"}

                  summary: Evento SSE de log
          description: Flujo SSE de eventos job.log con id incremental.
        '404':
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
  /api/jobs/{id}/pause/:
    post:
      operationId: jobs_pause_create
      description: Solicita pausa cooperativa para un job. Si el job está pending
        se pausa de inmediato; si está running queda marcada la pausa y el plugin
        coopera en la próxima verificación de control.
      summary: Solicitar pausa de un Job
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job científico.
        required: true
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobControlActionResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Transición inválida o plugin sin soporte de pausa.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
  /api/jobs/{id}/progress/:
    get:
      operationId: jobs_progress_retrieve
      description: Devuelve un snapshot del progreso actual del job para facilitar
        monitorización por polling o reconexión de stream SSE.
      summary: Consultar progreso de un Job
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job científico.
        required: true
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobProgressSnapshot'
              examples:
                SnapshotDeProgreso:
                  value:
                    job_id: 8ca8c1fa-1f2f-4a13-9038-9e1be7d0ce24
                    status: running
                    progress_percentage: 35
                    progress_stage: running
                    progress_message: Ejecutando plugin científico.
                    progress_event_index: 3
                    updated_at: '2026-03-10T12:00:00Z'
                  summary: Snapshot de progreso
                  description: Estado actual del job para consumo por polling o SSE.
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
  /api/jobs/{id}/resume/:
    post:
      operationId: jobs_resume_create
      description: Reanuda un job pausado y lo reencola para continuar desde su estado
        persistido cuando el plugin soporta pausa cooperativa.
      summary: Reanudar un Job pausado
      parameters:
      - in: path
