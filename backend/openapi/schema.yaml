components:
  schemas:
    BlankEnum:
      enum:
      - ''
    CalculatorJobCreateRequest:
      type: object
      description: |-
        Define parámetros estrictos para crear un job de calculadora.

        Este serializer protege el contrato antes de llegar al plugin. Así se evita
        encolar trabajos que no cumplirán reglas mínimas de dominio.
      properties:
        version:
          type: string
          minLength: 1
          default: '1.0'
          description: Versión del algoritmo calculadora.
          maxLength: 50
        op:
          allOf:
          - $ref: '#/components/schemas/CalculatorOperationEnum'
          description: |-
            Operación aritmética a ejecutar.

            * `add` - add
            * `sub` - sub
            * `mul` - mul
            * `div` - div
            * `pow` - pow
            * `factorial` - factorial
        a:
          type: number
          format: double
          description: Primer operando numérico.
        b:
          type: number
          format: double
          nullable: true
