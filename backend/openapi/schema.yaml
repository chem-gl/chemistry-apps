      - updated_at
    TunnelMetadata:
      type: object
      description: Metadatos técnicos de resultado Tunnel.
      properties:
        model_name:
          type: string
          maxLength: 120
        source_library:
          type: string
          maxLength: 120
        units:
          type: object
          additionalProperties:
            type: string
        input_event_count:
          type: integer
          minimum: 0
      required:
      - input_event_count
      - model_name
      - source_library
      - units
    TunnelParameters:
      type: object
      description: Parámetros persistidos de entrada para un job Tunnel.
      properties:
        reaction_barrier_zpe:
          type: number
          format: double
        imaginary_frequency:
          type: number
          format: double
        reaction_energy_zpe:
          type: number
          format: double
        temperature:
          type: number
          format: double
        input_change_events:
          type: array
          items:
            $ref: '#/components/schemas/TunnelInputChangeEvent'
      required:
      - imaginary_frequency
      - input_change_events
      - reaction_barrier_zpe
      - reaction_energy_zpe
      - temperature
    TunnelResult:
      type: object
      description: Resultado tipado del cálculo Tunnel.
      properties:
        u:
          type: number
          format: double
          description: Factor adimensional U.
        alpha_1:
          type: number
          format: double
          description: Parámetro Alpha 1.
        alpha_2:
          type: number
          format: double
          description: Parámetro Alpha 2.
        g:
          type: number
          format: double
          description: Valor G integrado para corrección túnel.
        kappa_tst:
          type: number
          format: double
          description: Factor de corrección túnel respecto al término clásico exp(-U).
        metadata:
          $ref: '#/components/schemas/TunnelMetadata'
      required:
      - alpha_1
      - alpha_2
      - g
      - kappa_tst
      - metadata
      - u
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
servers:
- url: http://localhost:8000
  description: Entorno local por hostname
- url: http://127.0.0.1:8000
  description: Entorno local por loopback
tags:
- name: Jobs
  description: Operaciones genéricas para consulta, progreso, eventos SSE y logs de
    jobs.
- name: Calculator
  description: Endpoints de ejecución para operaciones matemáticas de calculadora
    científica.
- name: RandomNumbers
  description: Endpoints de generación por lotes de números aleatorios con semilla
    externa.
- name: MolarFractions
  description: Endpoints para cálculo asíncrono de fracciones molares en equilibrio
    ácido-base.
- name: Tunnel
  description: Endpoints para cálculo del efecto túnel con teoría de Eckart asimétrica
    y trazabilidad de cambios de entrada.
- name: EasyRate
  description: Endpoints para cinética Easy-rate con carga de archivos Gaussian y
    persistencia de entradas para reproducibilidad.
- name: Marcus
  description: Endpoints para cinética por modelo Marcus con carga multipart y persistencia
    de entradas reproducibles.
