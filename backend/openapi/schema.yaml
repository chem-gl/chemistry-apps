    SaScoreJobCreateRequest:
      type: object
      description: |-
        Valida la creación de un job de SA score.

        Acepta `smiles` como string único o lista de strings.
        Acepta `methods` como lista de métodos válidos (ambit, brsa, rdkit).
      properties:
        smiles:
          type: array
          items:
            type: string
            maxLength: 4096
          writeOnly: true
          description: Lista de SMILES a evaluar. Máximo 500. Cada elemento debe ser
