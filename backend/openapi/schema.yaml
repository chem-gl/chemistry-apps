        reaction_distance:
          type: number
          format: double
          nullable: true
        print_data_input:
          type: boolean
        reactant_1_execution_index:
          type: integer
          nullable: true
        reactant_2_execution_index:
          type: integer
          nullable: true
        transition_state_execution_index:
          type: integer
          nullable: true
        product_1_execution_index:
          type: integer
