openapi: 3.0.3
info:
  title: Plataforma Científica Modular API
  version: 1.0.0
  description: API para plataforma científica ejecutable estructurada a través de
    plugins.
paths:
  /api/calculator/jobs/:
    post:
      operationId: calculator_jobs_create
      description: Recibe parámetros estrictos de calculadora y despacha el trabajo
        en background cuando no existe caché.
      summary: Crear Job de Calculadora
      tags:
      - Calculator
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculatorJobCreate'
            examples:
              CrearJobCalculadoraPotencia:
                value:
                  version: 1.0.0
                  op: pow
                  a: 2.0
                  b: 8.0
                summary: Crear job calculadora potencia
                description: 'Contrato estricto para potencia: resultado 2^8.'
              CrearJobCalculadoraFactorial:
                value:
                  version: 1.0.0
                  op: factorial
                  a: 5.0
                summary: Crear job calculadora factorial
                description: 'Contrato estricto para factorial: solo usa el campo
                  a.'
              CrearJobCalculadoraBásico:
                value:
                  version: 1.0.0
                  op: add
                  a: 5.0
                  b: 3.0
                summary: Crear job calculadora básico
                description: Contrato estricto para crear un job de calculadora.
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CalculatorJobCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CalculatorJobCreate'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculatorJobResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                FactorialInválido:
                  value:
                    a:
                    - Para factorial, a debe ser un entero no negativo.
                  summary: Factorial inválido
                OperaciónBinariaSinB:
                  value:
                    b:
                    - El campo b es obligatorio para operaciones binarias.
                  summary: Operación binaria sin b
          description: Error de validación del contrato de calculadora.
  /api/calculator/jobs/{id}/:
    get:
      operationId: calculator_jobs_retrieve
      description: Devuelve estado y resultado del job de calculadora por UUID.
      summary: Consultar Job de Calculadora
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job de calculadora.
        required: true
      tags:
      - Calculator
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculatorJobResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job de calculadora no encontrado.
  /api/jobs/:
    get:
      operationId: jobs_list
      description: Devuelve el listado de jobs científicos registrados en todas las
        apps, incluyendo su estado actual. Permite filtros opcionales por plugin y
        estado.
      summary: Listar Jobs Científicos
      parameters:
      - in: query
        name: plugin_name
        schema:
          type: string
        description: Filtra por nombre de plugin/app científica.
      - in: query
        name: status
        schema:
          type: string
        description: 'Filtra por estado del job. Valores válidos: pending, running,
          completed, failed.'
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScientificJob'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                EstadoInválido:
                  value:
                    detail: 'Invalid status filter. Allowed values are: pending, running,
                      completed, failed.'
                  summary: Estado inválido
          description: Filtro de estado inválido.
    post:
      operationId: jobs_create
      description: Evalua reglas de hashing/caching y despacha al worker Celery solo
        cuando el job no tiene cache disponible.
      summary: Despachar Job Científico
      tags:
      - Jobs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreate'
            examples:
              EjemploDeCreaciónDeJob:
                value:
                  plugin_name: calculator
                  version: '1.0'
                  parameters:
                    op: add
                    a: 5
                    b: 3
                summary: Ejemplo de Creación de Job
                description: Creación de una tarea matemática en background.
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/JobCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/JobCreate'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScientificJob'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ErrorPluginNoRegistrado:
                  value:
                    detail: Plugin requested is not registered
                  summary: Error plugin no registrado
          description: Error de validacion en parametros.
  /api/jobs/{id}/:
    get:
      operationId: jobs_retrieve
      description: Recupera todo el estado guardado incluyendo outputs una vez finalizado
        el trabajo subyacente.
      summary: Consultar Estado y Resultados de un Job
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job cientifico a consultar.
        required: true
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScientificJob'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: El trabajo no pudo ser encontrado en el Registry local.
  /api/jobs/{id}/events/:
    get:
      operationId: jobs_events_retrieve
      description: Abre un stream Server-Sent Events para recibir actualizaciones
        de progreso en tiempo real hasta completar/fallar o alcanzar timeout.
      summary: Suscribirse a eventos de progreso de un Job (SSE)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job científico.
        required: true
      - in: query
        name: timeout_seconds
        schema:
          type: integer
        description: 'Tiempo máximo del stream SSE en segundos. Valor por defecto:
          30.'
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                EventoSSE:
                  value: |+
                    id: 4
                    event: job.progress
                    data: {"job_id":"8ca8c1fa-1f2f-4a13-9038-9e1be7d0ce24","status":"running","progress_percentage":35,"progress_stage":"running","progress_message":"Ejecutando plugin científico.","progress_event_index":4,"updated_at":"2026-03-10T12:00:00Z"}

                  summary: Evento SSE
          description: Flujo SSE de eventos job.progress con id incremental.
        '404':
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
  /api/jobs/{id}/progress/:
    get:
      operationId: jobs_progress_retrieve
      description: Devuelve un snapshot del progreso actual del job para facilitar
        monitorización por polling o reconexión de stream SSE.
      summary: Consultar progreso de un Job
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job científico.
        required: true
      tags:
      - Jobs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobProgressSnapshot'
              examples:
                SnapshotDeProgreso:
                  value:
                    job_id: 8ca8c1fa-1f2f-4a13-9038-9e1be7d0ce24
                    status: running
                    progress_percentage: 35
                    progress_stage: running
                    progress_message: Ejecutando plugin científico.
                    progress_event_index: 3
                    updated_at: '2026-03-10T12:00:00Z'
                  summary: Snapshot de progreso
                  description: Estado actual del job para consumo por polling o SSE.
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Job no encontrado.
components:
  schemas:
    CalculatorJobCreate:
      type: object
      description: |-
        Define parámetros estrictos para crear un job de calculadora.

        Este serializer protege el contrato antes de llegar al plugin. Así se evita
        encolar trabajos que no cumplirán reglas mínimas de dominio.
      properties:
        version:
          type: string
          default: '1.0'
          description: Versión del algoritmo calculadora.
          maxLength: 50
        op:
          allOf:
          - $ref: '#/components/schemas/CalculatorOperationEnum'
          description: |-
            Operación aritmética a ejecutar.

            * `add` - add
            * `sub` - sub
            * `mul` - mul
            * `div` - div
            * `pow` - pow
            * `factorial` - factorial
        a:
          type: number
          format: double
          description: Primer operando numérico.
        b:
          type: number
          format: double
          nullable: true
          description: Segundo operando numérico. Es obligatorio para add/sub/mul/div/pow
            y no debe enviarse para factorial.
      required:
      - a
      - op
    CalculatorJobResponse:
      type: object
      description: |-
        Respuesta tipada para jobs de calculadora consumibles por frontend.

        Mantiene consistencia con el modelo de jobs de core y permite a clientes
        consumir resultados sin interpretar estructuras dinámicas ad-hoc.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        job_hash:
          type: string
          readOnly: true
          description: Hash SHA-256 for caching
        plugin_name:
          type: string
          readOnly: true
        algorithm_version:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/JobStatusEnum'
          readOnly: true
        cache_hit:
          type: boolean
          readOnly: true
        cache_miss:
          type: boolean
          readOnly: true
        parameters:
          $ref: '#/components/schemas/CalculatorParameters'
        results:
          allOf:
          - $ref: '#/components/schemas/CalculatorResult'
          nullable: true
        error_trace:
          type: string
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - algorithm_version
      - cache_hit
      - cache_miss
      - created_at
      - error_trace
      - id
      - job_hash
      - parameters
      - plugin_name
      - status
      - updated_at
    CalculatorOperationEnum:
      enum:
      - add
      - sub
      - mul
      - div
      - pow
      - factorial
      type: string
      description: |-
        * `add` - add
        * `sub` - sub
        * `mul` - mul
        * `div` - div
        * `pow` - pow
        * `factorial` - factorial
    CalculatorParameters:
      type: object
      description: Estructura de parámetros persistidos para el job calculadora.
      properties:
        op:
          $ref: '#/components/schemas/CalculatorOperationEnum'
        a:
          type: number
          format: double
          description: Primer operando almacenado para trazabilidad.
        b:
          type: number
          format: double
          nullable: true
          description: Segundo operando cuando aplica; ausente o nulo para factorial.
      required:
      - a
      - op
    CalculatorResult:
      type: object
      description: Resultado estricto del plugin calculadora.
      properties:
        final_result:
          type: number
          format: double
        metadata:
          $ref: '#/components/schemas/CalculatorResultMetadata'
      required:
      - final_result
      - metadata
    CalculatorResultMetadata:
      type: object
      description: Metadatos de trazabilidad del resultado de calculadora.
      properties:
        operation_used:
          allOf:
          - $ref: '#/components/schemas/CalculatorOperationEnum'
          description: |-
            Operación utilizada por el plugin para obtener el resultado.

            * `add` - add
            * `sub` - sub
            * `mul` - mul
            * `div` - div
            * `pow` - pow
            * `factorial` - factorial
        operand_a:
          type: number
          format: double
          description: Valor de entrada del operando a.
        operand_b:
          type: number
          format: double
          nullable: true
          description: Valor de entrada del operando b cuando aplica.
      required:
      - operand_a
      - operand_b
      - operation_used
    ErrorResponse:
      type: object
      description: Schema consistente para respuestas de error API.
      properties:
        detail:
          type: string
          description: Descripción del error manejado por API.
      required:
      - detail
    JobCreate:
      type: object
      description: |-
        Serializer puro para las peticiones de creación de un nuevo
        Job científico, siguiendo fuertemente el schema de OpenAPI.
      properties:
        plugin_name:
          type: string
          description: El nombre registrado del plugin o algoritmo a ejecutar.
          maxLength: 100
        version:
          type: string
          default: '1.0'
          description: Versión asociada del algoritmo que será parte de la llave de
            caché.
          maxLength: 50
        parameters:
          description: Diccionario dinámico de inputs o parámetros del job.
      required:
      - parameters
      - plugin_name
    JobProgressSnapshot:
      type: object
      description: Contrato de progreso de job usado en endpoint snapshot y stream
        SSE.
      properties:
        job_id:
          type: string
          format: uuid
          description: Identificador único del job.
        status:
          allOf:
          - $ref: '#/components/schemas/JobStatusEnum'
          description: |-
            Estado principal del ciclo de vida del job.

            * `pending` - Pending
            * `running` - Running
            * `completed` - Completed
            * `failed` - Failed
        progress_percentage:
          type: integer
          maximum: 100
          minimum: 0
          description: Porcentaje de avance entre 0 y 100.
        progress_stage:
          allOf:
          - $ref: '#/components/schemas/JobProgressStageEnum'
          description: |-
            Etapa fina de ejecución para seguimiento en tiempo real.

            * `pending` - pending
            * `queued` - queued
            * `running` - running
            * `caching` - caching
            * `completed` - completed
            * `failed` - failed
        progress_message:
          type: string
          description: Mensaje legible para usuario con contexto de ejecución.
        progress_event_index:
          type: integer
          minimum: 0
          description: Contador incremental de eventos emitidos por el job.
        updated_at:
          type: string
          format: date-time
          description: Marca temporal de última actualización.
      required:
      - job_id
      - progress_event_index
      - progress_message
      - progress_percentage
      - progress_stage
      - status
      - updated_at
    JobProgressStageEnum:
      enum:
      - pending
      - queued
      - running
      - caching
      - completed
      - failed
      type: string
      description: |-
        * `pending` - pending
        * `queued` - queued
        * `running` - running
        * `caching` - caching
        * `completed` - completed
        * `failed` - failed
    JobStatusEnum:
      enum:
      - pending
      - running
      - completed
      - failed
      type: string
      description: |-
        * `pending` - Pending
        * `running` - Running
        * `completed` - Completed
        * `failed` - Failed
    ScientificJob:
      type: object
      description: |-
        Serializer central que describe toda la entidad del Job.
        Usado como schema de salida.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        job_hash:
          type: string
          readOnly: true
          description: Hash SHA-256 for caching
        plugin_name:
          type: string
          readOnly: true
        algorithm_version:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/JobStatusEnum'
          readOnly: true
        cache_hit:
          type: boolean
          readOnly: true
        cache_miss:
          type: boolean
          readOnly: true
        progress_percentage:
          type: integer
          readOnly: true
          description: Porcentaje de progreso entre 0 y 100.
        progress_stage:
          type: string
          readOnly: true
          description: 'Etapa actual de ejecución: pending/queued/running/caching/completed/failed.'
        progress_message:
          type: string
          readOnly: true
          description: Mensaje corto y legible del estado de progreso.
        progress_event_index:
          type: integer
          readOnly: true
          description: Contador incremental de eventos de progreso emitidos.
        parameters:
          readOnly: true
        results:
          readOnly: true
          nullable: true
        error_trace:
          type: string
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - algorithm_version
      - cache_hit
      - cache_miss
      - created_at
      - error_trace
      - id
      - job_hash
      - parameters
      - plugin_name
      - progress_event_index
      - progress_message
      - progress_percentage
      - progress_stage
      - results
      - status
      - updated_at
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
