      description: Snapshot mínimo por estructura usada en modelo Marcus.
      properties:
        source_field:
          type: string
          maxLength: 80
        original_filename:
          type: string
          maxLength: 255
        scf_energy:
          type: number
          format: double
        thermal_free_enthalpy:
          type: number
          format: double
        temperature:
          type: number
          format: double
      required:
      - original_filename
      - scf_energy
      - source_field
      - temperature
      - thermal_free_enthalpy
    MarcusStructures:
      type: object
      description: Conjunto de estructuras obligatorias del cálculo Marcus.
      properties:
        reactant_1_file:
          $ref: '#/components/schemas/MarcusStructureSnapshot'
        reactant_2_file:
          $ref: '#/components/schemas/MarcusStructureSnapshot'
        product_1_adiabatic_file:
          $ref: '#/components/schemas/MarcusStructureSnapshot'
        product_2_adiabatic_file:
          $ref: '#/components/schemas/MarcusStructureSnapshot'
        product_1_vertical_file:
          $ref: '#/components/schemas/MarcusStructureSnapshot'
        product_2_vertical_file:
          $ref: '#/components/schemas/MarcusStructureSnapshot'
      required:
      - product_1_adiabatic_file
      - product_1_vertical_file
      - product_2_adiabatic_file
      - product_2_vertical_file
      - reactant_1_file
      - reactant_2_file
    MolarFractionRow:
      type: object
      description: Fila de tabla de fracciones para un pH específico.
      properties:
        ph:
          type: number
          format: double
          description: Valor de pH evaluado.
        fractions:
          type: array
          items:
            type: number
            format: double
          description: Fracciones molares f0..fn en el orden de especies.
        sum_fraction:
          type: number
          format: double
          description: Suma de fracciones para verificación numérica.
      required:
      - fractions
      - ph
      - sum_fraction
    MolarFractionsJobCreateRequest:
      type: object
      description: Valida parámetros de creación para jobs de fracciones molares.
      properties:
        version:
          type: string
          minLength: 1
          default: 1.0.0
          maxLength: 50
        pka_values:
          type: array
          items:
            type: number
            format: double
          description: Lista de pKa en el orden químico definido por el usuario.
          maxItems: 6
          minItems: 1
        ph_mode:
          allOf:
          - $ref: '#/components/schemas/PhModeEnum'
          description: |-
            Modo de cálculo: single para un pH o range para barrido.

            * `single` - single
            * `range` - range
        ph_value:
          type: number
          format: double
          nullable: true
          description: Valor de pH cuando ph_mode=single.
        ph_min:
          type: number
          format: double
          nullable: true
          description: pH inicial para ph_mode=range.
        ph_max:
          type: number
          format: double
          nullable: true
          description: pH final para ph_mode=range.
        ph_step:
          type: number
          format: double
          nullable: true
          description: Incremento de pH para ph_mode=range.
      required:
      - ph_mode
      - pka_values
    MolarFractionsJobResponse:
      type: object
      description: Respuesta estable para jobs de molar_fractions.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        job_hash:
          type: string
          readOnly: true
          description: Hash SHA-256 for caching
        plugin_name:
          type: string
          readOnly: true
        algorithm_version:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        cache_hit:
          type: boolean
          readOnly: true
        cache_miss:
          type: boolean
          readOnly: true
        progress_percentage:
          type: integer
          readOnly: true
          description: Porcentaje de progreso entre 0 y 100.
        progress_stage:
          type: string
          readOnly: true
          description: 'Etapa actual de ejecución: pending/queued/running/paused/caching/completed/failed.'
        progress_message:
          type: string
          readOnly: true
          description: Mensaje corto y legible del estado de progreso.
        progress_event_index:
          type: integer
          readOnly: true
          description: Contador incremental de eventos de progreso emitidos.
        parameters:
          $ref: '#/components/schemas/MolarFractionsParameters'
        results:
          allOf:
          - $ref: '#/components/schemas/MolarFractionsResult'
          nullable: true
        error_trace:
          type: string
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - algorithm_version
      - cache_hit
      - cache_miss
      - created_at
      - error_trace
      - id
      - job_hash
      - parameters
      - plugin_name
      - progress_event_index
      - progress_message
      - progress_percentage
      - progress_stage
      - status
      - updated_at
    MolarFractionsMetadata:
      type: object
      description: Metadatos técnicos del barrido de fracciones molares.
      properties:
        pka_values:
          type: array
          items:
            type: number
            format: double
        ph_mode:
          $ref: '#/components/schemas/PhModeEnum'
        ph_min:
          type: number
          format: double
        ph_max:
          type: number
          format: double
        ph_step:
          type: number
          format: double
        total_species:
          type: integer
          minimum: 2
        total_points:
          type: integer
          minimum: 1
      required:
      - ph_max
      - ph_min
      - ph_mode
      - ph_step
      - pka_values
      - total_points
      - total_species
    MolarFractionsParameters:
      type: object
      description: Estructura persistida de parámetros de entrada del job.
      properties:
        pka_values:
          type: array
          items:
            type: number
            format: double
          maxItems: 6
          minItems: 1
        ph_mode:
          $ref: '#/components/schemas/PhModeEnum'
        ph_value:
          type: number
          format: double
          nullable: true
        ph_min:
          type: number
          format: double
          nullable: true
        ph_max:
          type: number
          format: double
          nullable: true
        ph_step:
          type: number
          format: double
          nullable: true
      required:
      - ph_mode
      - pka_values
    MolarFractionsResult:
      type: object
      description: Resultado tipado del plugin de fracciones molares.
      properties:
        species_labels:
          type: array
          items:
            type: string
            maxLength: 20
          description: Etiquetas de especies en formato f0..fn.
        rows:
          type: array
          items:
            $ref: '#/components/schemas/MolarFractionRow'
        metadata:
          $ref: '#/components/schemas/MolarFractionsMetadata'
      required:
      - metadata
      - rows
      - species_labels
    PhModeEnum:
      enum:
      - single
      - range
      type: string
      description: |-
        * `single` - single
        * `range` - range
    ProgressStageEnum:
      enum:
      - pending
      - queued
      - running
      - paused
      - recovering
      - caching
      - completed
      - failed
      - cancelled
      type: string
      description: |-
        * `pending` - pending
        * `queued` - queued
        * `running` - running
        * `paused` - paused
        * `recovering` - recovering
        * `caching` - caching
        * `completed` - completed
        * `failed` - failed
        * `cancelled` - cancelled
    RandomNumbersJobCreateRequest:
      type: object
      description: Valida request de creación para jobs de generación aleatoria.
      properties:
        version:
          type: string
          minLength: 1
          default: 1.0.0
          maxLength: 50
        seed_url:
          type: string
          format: uri
          minLength: 1
          description: URL cuyo contenido se usa como semilla determinista.
        numbers_per_batch:
          type: integer
          maximum: 500
          minimum: 1
          description: Cantidad de números generados por ciclo.
        interval_seconds:
          type: integer
          maximum: 3600
          minimum: 1
          description: Tiempo de espera entre ciclos de generación en segundos.
        total_numbers:
          type: integer
          maximum: 1000
          minimum: 1
          description: Cantidad total de números aleatorios a generar.
      required:
      - interval_seconds
      - numbers_per_batch
      - seed_url
      - total_numbers
    RandomNumbersJobResponse:
      type: object
      description: Salida tipada para jobs de random_numbers.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        job_hash:
          type: string
          readOnly: true
          description: Hash SHA-256 for caching
        plugin_name:
          type: string
          readOnly: true
        algorithm_version:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        cache_hit:
          type: boolean
          readOnly: true
        cache_miss:
          type: boolean
          readOnly: true
        progress_percentage:
          type: integer
          readOnly: true
          description: Porcentaje de progreso entre 0 y 100.
        progress_stage:
          type: string
          readOnly: true
          description: 'Etapa actual de ejecución: pending/queued/running/paused/caching/completed/failed.'
        progress_message:
          type: string
          readOnly: true
          description: Mensaje corto y legible del estado de progreso.
        progress_event_index:
          type: integer
          readOnly: true
          description: Contador incremental de eventos de progreso emitidos.
        parameters:
          $ref: '#/components/schemas/RandomNumbersParameters'
        results:
          allOf:
          - $ref: '#/components/schemas/RandomNumbersResult'
          nullable: true
        error_trace:
          type: string
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - algorithm_version
      - cache_hit
      - cache_miss
      - created_at
      - error_trace
      - id
      - job_hash
      - parameters
      - plugin_name
      - progress_event_index
      - progress_message
      - progress_percentage
      - progress_stage
      - status
      - updated_at
    RandomNumbersParameters:
      type: object
      description: Contrato persistido de parámetros del job random_numbers.
      properties:
        seed_url:
          type: string
          format: uri
        numbers_per_batch:
          type: integer
          minimum: 1
        interval_seconds:
          type: integer
          minimum: 1
        total_numbers:
          type: integer
          minimum: 1
      required:
      - interval_seconds
      - numbers_per_batch
      - seed_url
      - total_numbers
    RandomNumbersResult:
      type: object
      description: Resultado tipado de números aleatorios generados.
      properties:
        generated_numbers:
          type: array
          items:
            type: integer
            minimum: 0
        metadata:
          $ref: '#/components/schemas/RandomNumbersResultMetadata'
      required:
      - generated_numbers
      - metadata
    RandomNumbersResultMetadata:
      type: object
      description: Metadatos del resultado de generación aleatoria.
      properties:
        seed_url:
          type: string
          format: uri
        seed_digest:
          type: string
          maxLength: 64
        numbers_per_batch:
          type: integer
          minimum: 1
        interval_seconds:
          type: integer
          minimum: 1
        total_numbers:
          type: integer
          minimum: 1
      required:
      - interval_seconds
      - numbers_per_batch
      - seed_digest
      - seed_url
      - total_numbers
    ScientificJob:
      type: object
      description: |-
        Serializer central que describe toda la entidad del Job.
        Usado como schema de salida.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        job_hash:
          type: string
          readOnly: true
          description: Hash SHA-256 for caching
        plugin_name:
          type: string
          readOnly: true
        algorithm_version:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        cache_hit:
          type: boolean
          readOnly: true
        cache_miss:
          type: boolean
          readOnly: true
        progress_percentage:
          type: integer
          readOnly: true
          description: Porcentaje de progreso entre 0 y 100.
        progress_stage:
          type: string
          readOnly: true
          description: 'Etapa actual de ejecución: pending/queued/running/paused/caching/completed/failed.'
        progress_message:
          type: string
          readOnly: true
          description: Mensaje corto y legible del estado de progreso.
        progress_event_index:
          type: integer
          readOnly: true
          description: Contador incremental de eventos de progreso emitidos.
        supports_pause_resume:
          type: boolean
          readOnly: true
          description: Indica si el plugin permite pausa cooperativa y reanudación.
        pause_requested:
          type: boolean
          readOnly: true
          description: Marca de control cooperativo para solicitar pausa de ejecución.
        runtime_state:
          readOnly: true
          description: Estado serializable de ejecución para reanudar tareas pausadas.
        paused_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Marca temporal del último momento en que el job quedó en pausa.
        resumed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Marca temporal de la última reanudación explícita del job.
        parameters:
          readOnly: true
        results:
          readOnly: true
          nullable: true
        error_trace:
          type: string
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - algorithm_version
      - cache_hit
      - cache_miss
      - created_at
      - error_trace
      - id
      - job_hash
      - parameters
      - pause_requested
      - paused_at
      - plugin_name
      - progress_event_index
      - progress_message
      - progress_percentage
      - progress_stage
      - results
      - resumed_at
      - runtime_state
      - status
      - supports_pause_resume
      - updated_at
    SolventEnum:
      enum:
      - Benzene
      - Gas phase (Air)
      - Pentyl ethanoate
      - Water
      - Other
      type: string
      description: "* `` - \n* `Benzene` - Benzene\n* `Gas phase (Air)` - Gas phase
        (Air)\n* `Pentyl ethanoate` - Pentyl ethanoate\n* `Water` - Water\n* `Other`
        - Other"
    StatusEnum:
      enum:
      - pending
      - running
      - paused
      - completed
      - failed
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `running` - Running
        * `paused` - Paused
        * `completed` - Completed
        * `failed` - Failed
        * `cancelled` - Cancelled
    TunnelInputChangeEvent:
      type: object
      description: Evento individual de modificación de entradas.
      properties:
        field_name:
          type: string
          maxLength: 100
        previous_value:
          type: number
          format: double
        new_value:
          type: number
          format: double
        changed_at:
          type: string
          maxLength: 80
      required:
      - changed_at
      - field_name
      - new_value
      - previous_value
    TunnelJobCreateRequest:
      type: object
      description: Valida parámetros de creación para jobs de efecto túnel.
      properties:
        version:
          type: string
          minLength: 1
          default: 2.0.0
          maxLength: 50
        reaction_barrier_zpe:
          type: number
          format: double
          description: Reaction barrier ZPE en kcal/mol.
        imaginary_frequency:
          type: number
          format: double
          description: Imaginary frequency en cm^-1 (sin signo negativo).
        reaction_energy_zpe:
          type: number
          format: double
          description: Reaction energy ZPE en kcal/mol.
        temperature:
          type: number
          format: double
          description: Temperatura en Kelvin.
        input_change_events:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Eventos de modificación de entradas capturados en frontend.
          maxItems: 2000
      required:
      - imaginary_frequency
      - reaction_barrier_zpe
      - reaction_energy_zpe
      - temperature
    TunnelJobResponse:
      type: object
      description: Respuesta estable para jobs de la app Tunnel.
