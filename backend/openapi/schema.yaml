  /api/jobs/{id}/cancel/:
    post:
      operationId: jobs_cancel_create
      description: Cancela un job en estado pending, running o paused de forma inmediata
        e irreversible. No es posible reactivar un job cancelado. Los jobs en estado
        completed, failed o cancelled no pueden ser cancelados.
      summary: Cancelar un Job (irreversible)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: UUID del job científico.
        required: true
      tags:
