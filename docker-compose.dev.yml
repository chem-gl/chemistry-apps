# docker-compose.dev.yml: Entorno de desarrollo con hot-reload para frontend y backend.

services:
  redis:
    image: redis:7-alpine
    hostname: redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - ./.docker/dev/redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      app_dev_net:
        aliases:
          - redis

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    working_dir: /app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py up --without-celery --host 0.0.0.0 --port 8000"
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_DEBUG_ALLOW_ALL_HOSTS: "True"
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost,0.0.0.0"
      ENABLE_CORS: "True"
      CORS_ALLOW_ALL_ORIGINS: "False"
      CORS_ALLOW_CREDENTIALS: "True"
      CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://127.0.0.1:4200"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      CHANNEL_LAYERS_REDIS_URL: "redis://redis:6379/1"
      DB_ENGINE: "sqlite"
      DB_SQLITE_PATH: "/data/db.sqlite3"
    volumes:
      - ./backend:/app
      - ./.docker/dev/sqlite:/data
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_dev_net

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    working_dir: /app
    command: >
      sh -c "python -m celery -A config worker -l info"
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_DEBUG_ALLOW_ALL_HOSTS: "True"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      CHANNEL_LAYERS_REDIS_URL: "redis://redis:6379/1"
      DB_ENGINE: "sqlite"
      DB_SQLITE_PATH: "/data/db.sqlite3"
    volumes:
      - ./backend:/app
      - ./.docker/dev/sqlite:/data
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - app_dev_net

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    working_dir: /app
    command: >
      sh -c "python -m celery -A config beat -l info"
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_DEBUG_ALLOW_ALL_HOSTS: "True"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      CHANNEL_LAYERS_REDIS_URL: "redis://redis:6379/1"
      DB_ENGINE: "sqlite"
      DB_SQLITE_PATH: "/data/db.sqlite3"
    volumes:
      - ./backend:/app
      - ./.docker/dev/sqlite:/data
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - app_dev_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    working_dir: /app
    command: >
      sh -c "npm install && npm run start"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - app_dev_net

volumes:
  frontend_node_modules:

networks:
  app_dev_net:
    driver: bridge
