# sonar-project.properties: Configuración base de SonarQube/SonarCloud para Chemistry Apps.
# Consume los reportes generados por scripts/generate_sonar_coverage.sh antes de ejecutar el análisis.

sonar.projectKey=chemistry-apps
sonar.projectName=chemistry-apps
sonar.sourceEncoding=UTF-8
sonar.host.url=http://localhost:9000
sonar.token=${env.SONAR_TOKEN}

sonar.sources=backend/apps,backend/config,backend/libs,frontend/src,scripts
sonar.tests=backend,frontend/src
sonar.test.inclusions=backend/**/tests.py,backend/**/test_*.py,frontend/src/**/*.spec.ts
sonar.exclusions=.docker/**,.scannerwork/**,backend/venv/**,backend/media/**,backend/__pycache__/**,frontend/dist/**,frontend/coverage/**,frontend/node_modules/**,frontend/src/app/core/api/generated/**,sonar-project.properties,**/generated/**,**/node_modules/**,**/dist/**,.env,**/.env,**/.git/**,**/.github/**,**/.vscode/**,**/tools/**,sonar_report.json,backend/libs/**,backend/apps/core/migrations/**
sonar.python.exclusions=.docker/**,.scannerwork/**,backend/venv/**,backend/media/**,backend/__pycache__/**,backend/libs/**,backend/apps/core/migrations/**

sonar.python.version=3.12
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.sarifReportPaths=backend/ruff.json

sonar.eslint.reportPaths=frontend/eslint.json
sonar.javascript.lcov.reportPaths=frontend/coverage/frontend/lcov.info
sonar.coverage.exclusions=frontend/src/**/*.html,scripts/**
sonar.cpd.exclusions=frontend/src/**/*.spec.ts,backend/**/tests.py,backend/**/test_*.py,backend/libs/**
