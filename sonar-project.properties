# sonar-project.properties: Configuración base de SonarQube/SonarCloud para Chemistry Apps.
# Consume los reportes generados por scripts/generate_sonar_coverage.sh antes de ejecutar el análisis.

sonar.projectKey=chemistry-apps
sonar.projectName=chemistry-apps
sonar.sourceEncoding=UTF-8
sonar.host.url=http://localhost:9000
sonar.token=${env.SONAR_TOKEN}

sonar.sources=backend/apps,backend/config,backend/libs,frontend/src
sonar.tests=backend,frontend/src,frontend/e2e
sonar.test.inclusions=backend/**/tests.py,backend/**/test_*.py,frontend/e2e/**/*.spec.ts
sonar.exclusions=.docker/**,.scannerwork/**,backend/.venv/**,backend/media/**,backend/__pycache__/**,frontend/dist/**,frontend/coverage/**,frontend/node_modules/**,frontend/src/**/*.spec.ts,frontend/src/app/core/api/generated/**,sonar-project.properties,**/generated/**,**/node_modules/**,**/dist/**,.env,**/.env,**/.git/**,**/.github/**,**/.vscode/**,**/tools/**,sonar_report.json,backend/libs/**,backend/apps/**/migrations/**,scripts/**,backend/apps/core/declarative_api_usage_examples.py
sonar.python.exclusions=.docker/**,.scannerwork/**,backend/.venv/**,backend/media/**,backend/__pycache__/**,backend/libs/**,backend/apps/**/migrations/**,scripts/**,backend/apps/core/declarative_api_usage_examples.py
sonar.python.version=3.12
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.sarifReportPaths=backend/ruff.json

sonar.eslint.reportPaths=frontend/eslint.json
sonar.javascript.lcov.reportPaths=frontend/coverage/frontend/lcov-sonar.info,frontend/coverage/e2e/lcov.info
# Exclusiones de cobertura: archivos de infraestructura, configuración y entry points
# que no aportan valor siendo testeados directamente (sin lógica de negocio)
sonar.coverage.exclusions=\
  frontend/src/**/*.html,\
  scripts/**,\
  frontend/src/main.ts,\
  frontend/src/test-setup.ts,\
  frontend/src/app/app.config.ts,\
  frontend/src/app/app.routes.ts,\
  frontend/src/environments/**,\
  backend/config/asgi.py,\
  backend/config/wsgi.py,\
  backend/config/startup_production.py,\
  backend/config/celery.py,\
  backend/config/settings.py,\
  backend/apps/**/management/commands/**,\
  backend/apps/**/migrations/**,\
  backend/apps/core/management/commands/**,\
  backend/apps/core/declarative_api_usage_examples.py
sonar.cpd.exclusions=frontend/src/**/*.spec.ts,frontend/e2e/**/*.spec.ts,backend/**/tests.py,backend/**/test_*.py,backend/libs/**,frontend/src/app/sa-score/sa-score.component.html,frontend/src/app/toxicity-properties/toxicity-properties.component.html,frontend/src/app/core/shared/scientific-apps.config.ts

# Ignorar reglas específicas por contexto de desarrollo
# S5332: uso de http en lugar de https (aceptable en URLs locales de desarrollo)
# S5852: regex con backtracking catastrófico / expresiones regulares largas o complejas
# S4347: generador pseudoaleatorio (aceptable en cálculos científicos, no en criptografía)
sonar.issue.ignore.multicriteria=http_back,http_front,regex_global,prng_back

# Backend Python: http aceptable globalmente en análisis Python del proyecto.
# Justificación: el contexto de esta regla en este repositorio se limita a desarrollo/local y
# no debe generar ruido en análisis estático.
sonar.issue.ignore.multicriteria.http_back.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.http_back.resourceKey=**/*.py

# Frontend TypeScript: http aceptable únicamente en archivos de entorno de desarrollo
# Justificación: apiBaseUrl apunta a http://localhost, no representa riesgo de seguridad
sonar.issue.ignore.multicriteria.http_front.ruleKey=typescript:S5332
sonar.issue.ignore.multicriteria.http_front.resourceKey=frontend/src/environments/**

# Global: ignorar regex complejas/largas en todos los archivos de todos los lenguajes
# Justificación: las expresiones regulares del proyecto son intencionadas y revisadas
sonar.issue.ignore.multicriteria.regex_global.ruleKey=*:S5852
sonar.issue.ignore.multicriteria.regex_global.resourceKey=**/*

# Plugin random_numbers: generador pseudoaleatorio aceptable en simulaciones numéricas
# Justificación: random.random() se usa exclusivamente para cálculos científicos, no para criptografía
sonar.issue.ignore.multicriteria.prng_back.ruleKey=python:S4347
sonar.issue.ignore.multicriteria.prng_back.resourceKey=backend/apps/random_numbers/plugin.py
