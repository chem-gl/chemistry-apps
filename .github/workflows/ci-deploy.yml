name: CI / CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - dev
  workflow_dispatch: {}

jobs:
  tests:
    name: Test matrix (${{ matrix.service }})
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        if: matrix.service == 'backend'
        uses: actions/setup-python@v6
        with:
          python-version: &python_version 3.12
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        if: matrix.service == 'backend'
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        if: matrix.service == 'backend'
        working-directory: backend
        run: python manage.py test

      - name: Setup Node.js
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        if: matrix.service == 'frontend'
        working-directory: frontend
        run: npm ci

      - name: Validate frontend build
        if: matrix.service == 'frontend'
        working-directory: frontend
        run: npm run build

  build:
    name: Build reusable workflow
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    needs: [tests]
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      create_release: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    secrets: inherit

  deploy:
    name: Deploy reusable workflow
    if: github.ref == 'refs/heads/main'
    needs: [tests, build]
    uses: ./.github/workflows/deploy.yml
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
    secrets: inherit
