name: CI / CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - dev
  workflow_dispatch: {}

jobs:
  tests:
    name: Test matrix (${{ matrix.service }})
    runs-on: ubuntu-latest
    # Los tests solo corren en push a dev; en main y PRs ya debieron pasar en dev.
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python 3.14
        if: matrix.service == 'backend'
        uses: actions/setup-python@v6
        with:
          python-version: &python_version 3.14
          cache: pip
          cache-dependency-path: backend/poetry.lock

      - name: Install backend deps
        if: matrix.service == 'backend'
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry config virtualenvs.in-project true
          poetry env use python
          poetry install --with dev --no-interaction --no-ansi

      - name: Run backend tests
        if: matrix.service == 'backend'
        working-directory: backend
        env:
          JOB_DISPATCH_ENABLED: "0"
        run: poetry run python manage.py test

      - name: Setup Node.js
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        if: matrix.service == 'frontend'
        working-directory: frontend
        run: npm ci

      - name: Validate frontend build
        if: matrix.service == 'frontend'
        working-directory: frontend
        run: npm run build

  build:
    name: Build reusable workflow
    # Corre en dev, main y PRs; acepta tests skipped (solo corren en dev).
    if: |
      always() &&
      (needs.tests.result == 'success' || needs.tests.result == 'skipped') &&
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    needs: [tests]
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      create_release: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    secrets: inherit

  deploy:
    name: Deploy reusable workflow
    if: always() && needs.build.result == 'success' && github.ref == 'refs/heads/main'
    needs: [build]
    uses: ./.github/workflows/deploy.yml
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
    secrets: inherit
