# .github/workflows/ci-deploy.yml
# GitHub Actions pipeline para:
# 1) ejecutar tests, compilar y generar artefactos (tar + images)
# 2) subir artefactos a los artifacts de Actions
# 3) al merge en main, descargar artefactos y desplegar en un servidor Debian via SSH

name: CI / CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - dev
  workflow_dispatch: {}

env:
  BACKEND_TAR: backend-code.tar.gz
  FRONTEND_TAR: frontend-dist.tar.gz
  BACKEND_IMG: backend-image.tar
  FRONTEND_IMG: frontend-image.tar

jobs:
  dev-tests:
    name: Run tests on dev branch
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python manage.py test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

  ci:
    name: Build + artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend (production)
        run: |
          docker build \
            --build-arg API_BASE_URL=${{ secrets.BACKEND_PUBLIC_URL }} \
            -t chemistry-frontend:latest \
            -f frontend/Dockerfile --target prod frontend/

      - name: Build backend Docker image (prod)
        run: |
          docker build -t chemistry-backend:latest -f backend/Dockerfile --target prod backend/

      - name: "Create artifact: backend code tar"
        run: |
          tar --exclude='**/__pycache__' --exclude='**/*.pyc' --exclude='**/.venv' --exclude='backend/media' -czf $BACKEND_TAR backend/ docker-compose.yml

      - name: "Create artifact: frontend dist tar"
        run: |
          tar -czf $FRONTEND_TAR dist/frontend/

      - name: Export backend Docker image
        run: docker save chemistry-backend:latest -o $BACKEND_IMG

      - name: Export frontend Docker image
        run: docker save chemistry-frontend:latest -o $FRONTEND_IMG

      - name: Create deploy .env
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import textwrap

          required = [
              "DJANGO_SECRET_KEY",
              "BACKEND_PUBLIC_URL",
              "FRONTEND_PUBLIC_URL",
              "BACKEND_INTERNAL_PORT",
              "FRONTEND_INTERNAL_PORT",
          ]

          missing = [k for k in required if not os.getenv(k)]
          if missing:
              raise SystemExit(f"Missing required env vars for deploy: {missing}")

          db_user = os.getenv("DB_USER", "postgres")
          db_pass = os.getenv("DB_PASSWORD", "postgres")
          db_name = os.getenv("DB_NAME", "chemistry_db")

          env_content = textwrap.dedent(f"""\
          # Deployment env for docker-compose
          DJANGO_SECRET_KEY={os.getenv('DJANGO_SECRET_KEY')}
          DJANGO_DEBUG=False
          DJANGO_ALLOWED_HOSTS=127.0.0.1,localhost,{os.getenv('BACKEND_PUBLIC_URL')}

          ENABLE_CORS=True
          CORS_ALLOW_ALL_ORIGINS=False
          CORS_ALLOW_CREDENTIALS=True
          CORS_ALLOWED_ORIGINS=http://localhost:4200,http://127.0.0.1:4200,https://{os.getenv('FRONTEND_PUBLIC_URL')}

          BACKEND_INTERNAL_PORT={os.getenv('BACKEND_INTERNAL_PORT')}
          FRONTEND_INTERNAL_PORT={os.getenv('FRONTEND_INTERNAL_PORT')}

          DB_ENGINE=postgres
          DB_HOST=db
          DB_PORT=5432
          DB_NAME={db_name}
          DB_USER={db_user}
          DB_PASSWORD={db_pass}

          CELERY_BROKER_URL=redis://redis:6379/0
          CELERY_RESULT_BACKEND=redis://redis:6379/0
          CHANNEL_LAYERS_REDIS_URL=redis://redis:6379/1
          """)

          Path(".env.deploy").write_text(env_content)
          PY

      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifacts
          path: |
            $BACKEND_TAR
            $FRONTEND_TAR
            $BACKEND_IMG
            $FRONTEND_IMG
            .env.deploy

  deploy:
    name: Deploy to remote server
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" ]; then echo "Missing secret: DEPLOY_SSH_PRIVATE_KEY"; exit 1; fi
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then echo "Missing secret: DEPLOY_HOST"; exit 1; fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then echo "Missing secret: DEPLOY_USER"; exit 1; fi
          if [ -z "${{ secrets.FRONTEND_PUBLIC_URL }}" ]; then echo "Missing secret: FRONTEND_PUBLIC_URL"; exit 1; fi
          if [ -z "${{ secrets.BACKEND_PUBLIC_URL }}" ]; then echo "Missing secret: BACKEND_PUBLIC_URL"; exit 1; fi
          if [ -z "${{ secrets.FRONTEND_INTERNAL_PORT }}" ]; then echo "Missing secret: FRONTEND_INTERNAL_PORT"; exit 1; fi
          if [ -z "${{ secrets.BACKEND_INTERNAL_PORT }}" ]; then echo "Missing secret: BACKEND_INTERNAL_PORT"; exit 1; fi

      - name: Checkout (needed for workflow metadata)
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Copy artifacts to remote host
        run: |
          scp -o StrictHostKeyChecking=no $BACKEND_TAR $FRONTEND_TAR $BACKEND_IMG $FRONTEND_IMG .env.deploy ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/

      - name: Deploy on remote host
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash -s <<'EOF'
            set -euo pipefail

            DEPLOY_DIR=~/chemistry-apps
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            # Limpia artefactos previos para evitar residuos (mantiene uploads/media locales)
            find backend -mindepth 1 -maxdepth 1 ! -name media -exec rm -rf {} +
            rm -rf dist

            tar -xzf ~/backend-code.tar.gz -C "$DEPLOY_DIR" --strip-components=0
            mkdir -p backend/media
            tar -xzf ~/frontend-dist.tar.gz -C "$DEPLOY_DIR" --strip-components=0

            docker load -i ~/backend-image.tar
            docker load -i ~/frontend-image.tar

            # Copy the .env generated in CI (contains all secrets needed by docker compose)
            if [ -f "$HOME/.env.deploy" ]; then
              cp "$HOME/.env.deploy" .env
            fi

            # Fallback: if .env still missing, use example and generate a secret key
            if [ ! -f ".env" ]; then
              if [ -f "backend/.env.example" ]; then
                cp backend/.env.example .env
              else
                echo "ERROR: .env.example not found" >&2
                exit 1
              fi
            fi

            if ! grep -qE "^DJANGO_SECRET_KEY=.+$" .env; then
              SECRET=$(python -c "import secrets; print(secrets.token_urlsafe(64))")
              echo "DJANGO_SECRET_KEY=$SECRET" >> .env
            fi

            # Ensure host directories exist (persistencia de datos y media)
            mkdir -p docker-data/redis docker-data/postgres backend/media

            # Run containers via docker compose
            docker compose down --remove-orphans || true
            docker compose up -d --force-recreate

            # Reload nginx (if instalado en el host)
            sudo systemctl reload nginx || sudo nginx -s reload || true
          EOF
