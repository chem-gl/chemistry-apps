# .github/workflows/ci-deploy.yml
# GitHub Actions pipeline para:
# 1) ejecutar tests, compilar y generar artefactos (tar + images)
# 2) subir artefactos a los artifacts de Actions
# 3) al merge en main, descargar artefactos y desplegar en un servidor Debian via SSH

name: CI / CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - dev
  workflow_dispatch: {}

env:
  BACKEND_TAR: backend-code.tar.gz
  FRONTEND_TAR: frontend-dist.tar.gz
  BACKEND_IMG: backend-image.tar
  FRONTEND_IMG: frontend-image.tar

jobs:
  dev-tests:
    name: Run tests on dev branch
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python manage.py test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

  ci:
    name: Build + tests + artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python manage.py test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend (production)
        run: |
          docker build \
            --build-arg API_BASE_URL=${{ secrets.BACKEND_PUBLIC_URL }} \
            -t chemistry-frontend:latest \
            -f frontend/Dockerfile --target prod frontend/

      - name: Build backend Docker image (prod)
        run: |
          docker build -t chemistry-backend:latest -f backend/Dockerfile --target prod backend/

      - name: "Create artifact: backend code tar"
        run: |
          tar --exclude='**/__pycache__' --exclude='**/*.pyc' --exclude='**/.venv' -czf $BACKEND_TAR backend/

      - name: "Create artifact: frontend dist tar"
        run: |
          tar -czf $FRONTEND_TAR dist/frontend/

      - name: Export backend Docker image
        run: docker save chemistry-backend:latest -o $BACKEND_IMG

      - name: Export frontend Docker image
        run: docker save chemistry-frontend:latest -o $FRONTEND_IMG

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifacts
          path: |
            $BACKEND_TAR
            $FRONTEND_TAR
            $BACKEND_IMG
            $FRONTEND_IMG

  deploy:
    name: Deploy to remote server
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" ]; then echo "Missing secret: DEPLOY_SSH_PRIVATE_KEY"; exit 1; fi
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then echo "Missing secret: DEPLOY_HOST"; exit 1; fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then echo "Missing secret: DEPLOY_USER"; exit 1; fi
          if [ -z "${{ secrets.FRONTEND_PUBLIC_URL }}" ]; then echo "Missing secret: FRONTEND_PUBLIC_URL"; exit 1; fi
          if [ -z "${{ secrets.BACKEND_PUBLIC_URL }}" ]; then echo "Missing secret: BACKEND_PUBLIC_URL"; exit 1; fi
          if [ -z "${{ secrets.FRONTEND_INTERNAL_PORT }}" ]; then echo "Missing secret: FRONTEND_INTERNAL_PORT"; exit 1; fi
          if [ -z "${{ secrets.BACKEND_INTERNAL_PORT }}" ]; then echo "Missing secret: BACKEND_INTERNAL_PORT"; exit 1; fi

      - name: Checkout (needed for workflow metadata)
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Copy artifacts to remote host
        run: |
          scp -o StrictHostKeyChecking=no $BACKEND_TAR $FRONTEND_TAR $BACKEND_IMG $FRONTEND_IMG ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/

      - name: Deploy on remote host
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash -s <<'EOF'
            set -euo pipefail

            DEPLOY_DIR=~/chemistry-apps
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            # Limpia artefactos previos para evitar residuos
            rm -rf backend dist

            tar -xzf ~/backend-code.tar.gz -C "$DEPLOY_DIR" --strip-components=0
            tar -xzf ~/frontend-dist.tar.gz -C "$DEPLOY_DIR" --strip-components=0

            docker load -i ~/backend-image.tar
            docker load -i ~/frontend-image.tar

            # Ensure .env exists
            if [ ! -f ".env" ]; then
              if [ -f "backend/.env.example" ]; then
                cp backend/.env.example .env
              else
                echo "ERROR: .env.example not found" >&2
                exit 1
              fi
            fi

            # Ensure DJANGO_SECRET_KEY exists
            if ! grep -q "^DJANGO_SECRET_KEY=" .env; then
              SECRET=$(python -c "import secrets; print(secrets.token_urlsafe(64))")
              echo "DJANGO_SECRET_KEY=$SECRET" >> .env
            fi

            # Fix environment values
            python - <<-'PY'
              import os
              from pathlib import Path

              def set_env(key, value):
                  path = Path('.env')
                  lines = path.read_text().splitlines()
                  found = False
                  for i, line in enumerate(lines):
                      if line.startswith(key + '='):
                          lines[i] = f"{key}={value}"
                          found = True
                          break
                  if not found:
                      lines.append(f"{key}={value}")
                  path.write_text("\n".join(lines) + "\n")

              set_env('DJANGO_DEBUG', 'False')
              set_env('ENABLE_CORS', 'True')
              set_env('CORS_ALLOWED_ORIGINS', 'http://localhost:4200,http://127.0.0.1:4200,https://${{ secrets.FRONTEND_PUBLIC_URL }}')
              set_env('DJANGO_ALLOWED_HOSTS', 'localhost,127.0.0.1,${{ secrets.BACKEND_PUBLIC_URL }}')
            PY

            # Run containers
            docker rm -f chemistry-backend || true
            docker rm -f chemistry-frontend || true

            docker run -d --name chemistry-backend --env-file .env -p ${{ secrets.BACKEND_INTERNAL_PORT }}:8000 chemistry-backend:latest
            docker run -d --name chemistry-frontend --env-file .env -p ${{ secrets.FRONTEND_INTERNAL_PORT }}:4210 chemistry-frontend:latest

            # Reload nginx
            sudo systemctl reload nginx || sudo nginx -s reload || true
          EOF
