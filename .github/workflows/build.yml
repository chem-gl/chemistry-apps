# .github/workflows/build.yml
# Workflow reutilizable para validar build local y publicar bundle del proyecto en GitHub Releases.

name: Reusable Build

on:
    workflow_call:
        inputs:
            create_release:
                description: Indica si se crea release en GitHub
                required: false
                default: false
                type: boolean
        outputs:
            image_tag:
                description: Tag inmutable generado durante el build
                value: ${{ jobs.build.outputs.image_tag }}
        secrets:
            BACKEND_PUBLIC_URL:
                required: false

env:
    DEPLOY_COMPOSE_FILE: docker-compose.yml
    DEPLOY_BUNDLE_PREFIX: chemistry-apps

jobs:
    build:
        name: Build validation
        runs-on: ubuntu-latest
        outputs:
            image_tag: ${{ steps.image_meta.outputs.image_tag }}
        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Resolve image tag
              id: image_meta
              run: |
                  echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

            - name: Build frontend (production)
              run: |
                  docker build \
                    --label "org.opencontainers.image.revision=${{ github.sha }}" \
                    --label "org.opencontainers.image.description=Chemistry Apps frontend production image" \
                    --build-arg API_BASE_URL=${{ secrets.BACKEND_PUBLIC_URL }} \
                    -t chemistry-frontend:${{ steps.image_meta.outputs.image_tag }} \
                    -f frontend/Dockerfile --target prod frontend/

            - name: Build backend Docker image (prod)
              run: |
                  docker build \
                    --label "org.opencontainers.image.revision=${{ github.sha }}" \
                    --label "org.opencontainers.image.description=Chemistry Apps backend production image" \
                    -t chemistry-backend:${{ steps.image_meta.outputs.image_tag }} \
                    -f backend/Dockerfile --target prod backend/

    release:
        name: Create release
        if: inputs.create_release
        runs-on: ubuntu-latest
        needs: [build]
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Build deploy bundle
              id: bundle_meta
              run: |
                  BUNDLE_NAME="${DEPLOY_BUNDLE_PREFIX}-${{ needs.build.outputs.image_tag }}.tar.gz"
                  git archive --format=tar.gz --output "$BUNDLE_NAME" "${GITHUB_SHA}"
                  echo "bundle_name=$BUNDLE_NAME" >> "$GITHUB_OUTPUT"

            - name: Create GitHub release
              uses: softprops/action-gh-release@v1
              with:
                  files: |
                      ${{ steps.bundle_meta.outputs.bundle_name }}
                      ${{ env.DEPLOY_COMPOSE_FILE }}
                  tag_name: main-${{ needs.build.outputs.image_tag }}
                  name: Release main-${{ needs.build.outputs.image_tag }}
                  body: |
                      Automatico: se genero la release main-${{ needs.build.outputs.image_tag }}

                      Assets de despliegue:
                      - ${{ steps.bundle_meta.outputs.bundle_name }}
                      - ${{ env.DEPLOY_COMPOSE_FILE }}
              env:
                  GITHUB_TOKEN: ${{ github.token }}
