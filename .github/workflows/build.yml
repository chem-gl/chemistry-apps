# .github/workflows/build.yml
# Workflow reutilizable para compilar imágenes, exponer IMAGE_TAG y publicar artifacts.

name: Reusable Build

on:
    workflow_call:
        inputs:
            create_release:
                description: Indica si se crea release en GitHub
                required: false
                default: false
                type: boolean
        outputs:
            image_tag:
                description: Tag inmutable generado durante el build
                value: ${{ jobs.build.outputs.image_tag }}
        secrets:
            BACKEND_PUBLIC_URL:
                required: false

env:
    DEPLOY_COMPOSE_FILE: docker-compose.yml
    BACKEND_IMG_GZ: backend-image.tar.gz
    FRONTEND_IMG_GZ: frontend-image.tar.gz

jobs:
    build:
        name: Build + artifacts
        runs-on: ubuntu-latest
        outputs:
            image_tag: ${{ steps.image_meta.outputs.image_tag }}
        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Resolve image tag
              id: image_meta
              run: |
                  echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

            - name: Build frontend (production)
              run: |
                  docker build \
                    --build-arg API_BASE_URL=${{ secrets.BACKEND_PUBLIC_URL }} \
                    -t chemistry-frontend:${{ steps.image_meta.outputs.image_tag }} \
                    -f frontend/Dockerfile --target prod frontend/

            - name: Build backend Docker image (prod)
              run: |
                  docker build -t chemistry-backend:${{ steps.image_meta.outputs.image_tag }} -f backend/Dockerfile --target prod backend/

            - name: Export backend Docker image (compressed)
              run: docker save chemistry-backend:${{ steps.image_meta.outputs.image_tag }} | gzip -1 > $BACKEND_IMG_GZ

            - name: Export frontend Docker image (compressed)
              run: docker save chemistry-frontend:${{ steps.image_meta.outputs.image_tag }} | gzip -1 > $FRONTEND_IMG_GZ

            - name: Upload deployment artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: deployment-artifacts
                  path: |
                      ${{ env.DEPLOY_COMPOSE_FILE }}
                      ${{ env.BACKEND_IMG_GZ }}
                      ${{ env.FRONTEND_IMG_GZ }}

    release:
        name: Create release
        if: inputs.create_release
        runs-on: ubuntu-latest
        needs: [build]
        permissions:
            contents: write

        steps:
            - name: Download deployment artifacts
              uses: actions/download-artifact@v4
              with:
                  name: deployment-artifacts
                  path: .

            - name: Create GitHub release
              uses: softprops/action-gh-release@v1
              with:
                  files: |
                      ${{ env.DEPLOY_COMPOSE_FILE }}
                      ${{ env.BACKEND_IMG_GZ }}
                      ${{ env.FRONTEND_IMG_GZ }}
                  tag_name: main-${{ needs.build.outputs.image_tag }}
                  name: Release main-${{ needs.build.outputs.image_tag }}
                  body: |
                      Automatico: se genero la release main-${{ needs.build.outputs.image_tag }}
              env:
                  GITHUB_TOKEN: ${{ github.token }}
