# .github/workflows/build.yml
# Workflow reutilizable para compilar imágenes, publicar en GHCR y crear release liviana.

name: Reusable Build

on:
    workflow_call:
        inputs:
            create_release:
                description: Indica si se crea release en GitHub
                required: false
                default: false
                type: boolean
        outputs:
            image_tag:
                description: Tag inmutable generado durante el build
                value: ${{ jobs.build.outputs.image_tag }}
        secrets:
            BACKEND_PUBLIC_URL:
                required: false

env:
    DEPLOY_COMPOSE_FILE: docker-compose.yml

jobs:
    build:
        name: Build + push GHCR
        runs-on: ubuntu-latest
        outputs:
            image_tag: ${{ steps.image_meta.outputs.image_tag }}
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Resolve image tag
              id: image_meta
              run: |
                  echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

            - name: Build frontend (production)
              run: |
                  docker build \
                    --build-arg API_BASE_URL=${{ secrets.BACKEND_PUBLIC_URL }} \
                    -t chemistry-frontend:${{ steps.image_meta.outputs.image_tag }} \
                    -f frontend/Dockerfile --target prod frontend/

            - name: Build backend Docker image (prod)
              run: |
                  docker build \
                    -t chemistry-backend:${{ steps.image_meta.outputs.image_tag }} \
                    -f backend/Dockerfile --target prod backend/

            - name: Login to GHCR
              if: github.event_name == 'push'
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ github.token }}

            - name: Push backend/frontend images to GHCR
              if: github.event_name == 'push'
              run: |
                  BACKEND_REMOTE_IMAGE="ghcr.io/${{ github.repository_owner }}/chemistry-backend:${{ steps.image_meta.outputs.image_tag }}"
                  FRONTEND_REMOTE_IMAGE="ghcr.io/${{ github.repository_owner }}/chemistry-frontend:${{ steps.image_meta.outputs.image_tag }}"

                  docker tag chemistry-backend:${{ steps.image_meta.outputs.image_tag }} "$BACKEND_REMOTE_IMAGE"
                  docker tag chemistry-frontend:${{ steps.image_meta.outputs.image_tag }} "$FRONTEND_REMOTE_IMAGE"

                  docker push "$BACKEND_REMOTE_IMAGE"
                  docker push "$FRONTEND_REMOTE_IMAGE"

    release:
        name: Create release
        if: inputs.create_release
        runs-on: ubuntu-latest
        needs: [build]
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Create GitHub release
              uses: softprops/action-gh-release@v1
              with:
                  files: ${{ env.DEPLOY_COMPOSE_FILE }}
                  tag_name: main-${{ needs.build.outputs.image_tag }}
                  name: Release main-${{ needs.build.outputs.image_tag }}
                  body: |
                      Automatico: se genero la release main-${{ needs.build.outputs.image_tag }}

                      Imagenes publicadas en GHCR:
                      - ghcr.io/${{ github.repository_owner }}/chemistry-backend:${{ needs.build.outputs.image_tag }}
                      - ghcr.io/${{ github.repository_owner }}/chemistry-frontend:${{ needs.build.outputs.image_tag }}
              env:
                  GITHUB_TOKEN: ${{ github.token }}
