<!-- profile.component.html: Vista minimalista para editar perfil personal y contraseña. -->
<section class="profile-shell" [attr.aria-label]="'profile.aria.management' | transloco">
    <header class="profile-header metallic-card">
        <p class="eyebrow">{{ 'profile.header.eyebrow' | transloco }}</p>
        <h1>{{ 'profile.header.title' | transloco }}</h1>
        <p class="subtitle">{{ 'profile.header.subtitle' | transloco }}</p>
    </header>

    <article class="metallic-card profile-card">
        <form class="profile-form" (ngSubmit)="saveProfile()">
            <label>
                {{ 'profile.form.firstName' | transloco }}
                <input [ngModel]="formState().first_name" (ngModelChange)="setField('first_name', $event)"
                    name="first_name" type="text" autocomplete="given-name" />
            </label>

            <label>
                {{ 'profile.form.lastName' | transloco }}
                <input [ngModel]="formState().last_name" (ngModelChange)="setField('last_name', $event)"
                    name="last_name" type="text" autocomplete="family-name" />
            </label>

            <label class="wide-field">
                {{ 'profile.form.email' | transloco }}
                <input [ngModel]="formState().email" (ngModelChange)="setField('email', $event)" name="email"
                    autocomplete="email" type="email" required />
            </label>

            <label>
                {{ 'profile.form.newPassword' | transloco }}
                <input [ngModel]="formState().password" (ngModelChange)="setField('password', $event)" name="password"
                    type="password" autocomplete="new-password" minlength="8" />
            </label>

            <label>
                {{ 'profile.form.confirmPassword' | transloco }}
                <input [ngModel]="formState().password_confirmation"
                    (ngModelChange)="setField('password_confirmation', $event)" name="password_confirmation"
                    type="password" autocomplete="new-password" [required]="hasPasswordInput()" />
            </label>

            @if (errorMessage(); as currentError) {
            <p class="error-message" role="alert">{{ currentError }}</p>
            }

            @if (successMessage(); as currentSuccess) {
            <p class="success-message">{{ currentSuccess }}</p>
            }

            <div class="action-row">
                <button class="primary-button" type="submit" [disabled]="isSubmitting()">
                    {{ isSubmitting() ? ('profile.form.saving' | transloco) : ('profile.form.saveProfile' | transloco)
                    }}
                </button>
            </div>
        </form>
    </article>
</section>
