<!-- job-result-footer.component.html: Plantilla del footer reutilizable de resultados de jobs.
     Agrupa: panel de exportación de artefactos + logs de ejecución + tabla de historial. -->

<app-job-artifact-export-panel [fileDescriptors]="workflow.resultData()?.fileDescriptors ?? []"
    [isExporting]="workflow.isExporting()" [exportErrorMessage]="workflow.exportErrorMessage()"
    [activeSection]="workflow.activeSection()" [errorMessage]="workflow.errorMessage()"
    [currentJobId]="workflow.currentJobId()" [canExport]="canExport" (exportCsv)="exportCsv.emit()"
    (exportLog)="exportLog.emit()" (exportInputsZip)="exportInputsZip.emit()" (exportError)="exportError.emit()">
</app-job-artifact-export-panel>

<!-- ── Logs de ejecución ──────────────────────────────────────────── -->
<app-job-logs-panel [logs]="workflow.jobLogs()"></app-job-logs-panel>

<!-- ── Historial de jobs ──────────────────────────────────────────── -->
<app-job-history-table [jobs]="workflow.historyJobs()" [isLoading]="workflow.isHistoryLoading()"
    [emptyMessage]="emptyMessage" sectionTitle="Historical jobs" [ariaLabel]="ariaLabel"
    (reload)="workflow.loadHistory()" (openJob)="openJob.emit($event)"></app-job-history-table>
