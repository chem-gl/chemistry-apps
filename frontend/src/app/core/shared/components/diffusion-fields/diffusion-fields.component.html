<!-- diffusion-fields.component.html: Formulario para los parámetros de difusión (radios de reactivos y distancia de reacción). -->

@if (showDiffusionFields) {
<div class="param-grid diffusion-fields">
  <label>
    {{ 'shared.diffusionFields.radiusReactant1' | transloco }}
    <input type="number" step="0.01" [ngModel]="radiusReactant1" (ngModelChange)="radiusReactant1Change.emit($event)"
      [disabled]="isProcessing" />
  </label>

  <label>
    {{ 'shared.diffusionFields.radiusReactant2' | transloco }}
    <input type="number" step="0.01" [ngModel]="radiusReactant2" (ngModelChange)="radiusReactant2Change.emit($event)"
      [disabled]="isProcessing" />
  </label>

  <label>
    {{ 'shared.diffusionFields.reactionDistance' | transloco }}
    <input type="number" step="0.01" [ngModel]="reactionDistance" (ngModelChange)="reactionDistanceChange.emit($event)"
      [disabled]="isProcessing" />
  </label>
</div>
}
