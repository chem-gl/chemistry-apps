<!-- diffusion-fields.component.html: Formulario para los parámetros de difusión (radios de reactivos y distancia de reacción). -->

@if (showDiffusionFields) {
<div class="param-grid diffusion-fields">
    <label>
        Radius reactant 1 (Å)
        <input type="number" step="0.01" [ngModel]="radiusReactant1"
            (ngModelChange)="radiusReactant1Change.emit($event)" [disabled]="isProcessing" />
    </label>

    <label>
        Radius reactant 2 (Å)
        <input type="number" step="0.01" [ngModel]="radiusReactant2"
            (ngModelChange)="radiusReactant2Change.emit($event)" [disabled]="isProcessing" />
    </label>

    <label>
        Reaction distance (Å)
        <input type="number" step="0.01" [ngModel]="reactionDistance"
            (ngModelChange)="reactionDistanceChange.emit($event)" [disabled]="isProcessing" />
    </label>
</div>
}
