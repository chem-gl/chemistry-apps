<!-- job-logs-panel.component.html: Panel de logs reutilizable para apps científicas. -->
@if (logs.length > 0) {
<section class="logs-card" [attr.aria-label]="'shared.jobLogs.ariaLabel' | transloco">
  <button class="logs-toggle" type="button" (click)="toggleExpanded()" [attr.aria-expanded]="isExpanded()">
    <span class="logs-toggle-copy">
      <span class="logs-toggle-title">{{ title }}</span>
      <span class="logs-toggle-count">{{ logs.length }}</span>
    </span>
    <span class="logs-toggle-icon" [class.is-expanded]="isExpanded()">▾</span>
  </button>

  @if (isExpanded()) {
  <div class="logs-list">
    @for (logEntry of logs; track logEntry.eventIndex) {
    <article class="log-item">
      <header class="log-header">
        <span class="log-level" [class]="logLevelClass(logEntry.level)">
          {{ logEntry.level }}
        </span>
        <span class="log-source">{{ logEntry.source }}</span>
        <span class="log-index">#{{ logEntry.eventIndex }}</span>
      </header>
      <p class="log-message">{{ logEntry.message }}</p>
      @if (hasPayload(logEntry)) {
      <pre class="log-payload">{{ logEntry.payload | json }}</pre>
      }
    </article>
    }
  </div>
  }
</section>
}
