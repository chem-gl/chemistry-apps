<!-- smiles-structure-trigger.component.html: Muestra preview química contextual en hover y modal al clic. -->
<div class="structure-trigger-shell" [class.is-empty]="!hasRenderableSmiles()" (mouseenter)="showHoverPreview()"
    (mouseleave)="hideHoverPreview()" (focusin)="showHoverPreview()" (focusout)="hideHoverPreview()">
    <button #triggerButton type="button" class="structure-trigger-button" (click)="openModal()"
        [disabled]="!hasRenderableSmiles()" [attr.aria-label]="triggerLabel">
        {{ triggerLabel }}
    </button>

    @if (hasRenderableSmiles() && isHoverPreviewVisible()) {
    <div class="structure-hover-panel" role="presentation" aria-hidden="true" [ngStyle]="hoverPanelStyles()">
        <app-smiles-structure-preview [title]="title" [smiles]="smiles" [svg]="svg" layout="inline"
            [showSmilesText]="false" [showAtomCount]="showAtomCount"
            [emptyLabel]="emptyLabel"></app-smiles-structure-preview>
    </div>
    }
</div>

@if (isModalOpen()) {
<div class="structure-trigger-modal-backdrop" role="presentation" tabindex="0" (click)="onBackdropClick($event)"
    (keydown)="onModalKeydown($event)">
    <section class="structure-trigger-modal" role="dialog" aria-modal="true" [attr.aria-label]="title"
        (click)="$event.stopPropagation()">
        <header class="structure-trigger-modal-header">
            <h5>{{ title }}</h5>
            <button type="button" class="structure-trigger-close" (click)="closeModal()">Close</button>
        </header>

        <app-smiles-structure-preview [title]="title" [smiles]="smiles" [svg]="svg" layout="detail"
            [showSmilesText]="showSmilesText" [showAtomCount]="true"
            [emptyLabel]="emptyLabel"></app-smiles-structure-preview>
    </section>
</div>
}
