<!-- principal-molecule-editor.component.html: Entrada de SMILES principal y acción de inspección del scaffold. -->

<label>
  Principal SMILES
  <input
    type="text"
    [ngModel]="principalSmiles"
    (ngModelChange)="onPrincipalSmilesChange($event)"
    [disabled]="isProcessing"
    placeholder="c1ccc2[nH]ccc2c1"
  />
</label>

<div class="principal-actions-row">
  <button class="btn-secondary" type="button" (click)="openSketchModifier()">
    ✏ Open sketch modifier
  </button>
  <button class="btn-secondary" type="button" (click)="requestInspect()" [disabled]="isProcessing">
    {{ isInspecting ? 'Inspecting...' : 'Inspect structure' }}
  </button>
</div>

<p class="catalog-smiles mono">{{ principalSmiles || 'Pending principal SMILES' }}</p>
<dialog
  #sketchModifierDialog
  class="sketch-modifier-dialog"
  (click)="onSketchModifierDialogClick($event)"
>
  <section class="sketch-modifier-modal" role="document" aria-label="Principal sketch modifier">
    <h4>Principal sketch modifier</h4>
    <p class="hint">Use the sketcher below to edit the principal molecule.</p>

    <div class="ketcher-frame-wrap" aria-label="Principal molecule sketcher">
      @if (isSketchModifierLoading()) {
        <div class="ketcher-loading" role="status" aria-label="Loading molecule sketcher">
          <div class="ketcher-loading-bar"><span class="ketcher-loading-progress"></span></div>
          <p class="ketcher-loading-text">Loading molecule sketcher…</p>
        </div>
      }
      <iframe
        #ketcherFrame
        class="ketcher-frame"
        [src]="ketcherPublicUrl"
        title="Ketcher principal sketcher"
        (load)="onKetcherFrameLoaded()"
      ></iframe>
    </div>

    @if (sketchValidationError()) {
      <p class="sketch-validation-error" role="alert">{{ sketchValidationError() }}</p>
    }

    <div class="sketch-modifier-actions">
      <button
        class="btn-secondary"
        type="button"
        (click)="closeSketchModifier()"
        [disabled]="isProcessing"
      >
        Cancel
      </button>
      <button
        class="btn-secondary"
        type="button"
        (click)="applySketchModifier()"
        [disabled]="isProcessing"
      >
        Apply
      </button>
    </div>
  </section>
</dialog>
<!-- Precarga de Ketcher: el iframe inicia la descarga al montar la página -->
<div class="ketcher-preloader" aria-hidden="true">
  <iframe [src]="ketcherPublicUrl" title="" tabindex="-1" aria-hidden="true"></iframe>
</div>
